    :root{color-scheme:dark;--gold:#ffe6a3;--text:#fffaf0;--muted:#f2e7bd}

    main,canvas{position:fixed;inset:0;width:100%;height:100%;display:block}
    #hud{position:fixed;inset:18px auto auto 18px;z-index:3;display:grid;gap:8px;pointer-events:none;text-shadow:0 2px 14px rgba(0,0,0,.82)}

    #status{max-width:min(860px,calc(100vw - 36px));padding:8px 12px;border-radius:999px;background:rgba(2,6,4,.78);color:var(--muted);font-size:.78rem;font-weight:750;box-shadow:inset 0 0 0 1px rgba(255,255,255,.16),0 12px 42px rgba(0,0,0,.34);-webkit-backdrop-filter:blur(14px) saturate(1.2);backdrop-filter:blur(14px) saturate(1.2)}

    @media (prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important;scroll-behavior:auto!important}}
