<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Workshop Assistant</title>
  <style>
    :root{color-scheme:dark;--gold:#ffe18a;--panel:rgba(9,11,13,.64);--line:rgba(255,255,255,.13)}
    *{box-sizing:border-box}html,body{margin:0;height:100%;overflow:hidden;background:#090908;color:#f4ead0;font-family:Inter,system-ui,sans-serif}#view{position:fixed;inset:0;display:block;cursor:crosshair}.hud{position:fixed;left:14px;top:12px;z-index:8;pointer-events:none}.card{border:1px solid var(--line);border-radius:16px;background:var(--panel);box-shadow:0 18px 80px rgba(0,0,0,.34);backdrop-filter:blur(14px);padding:10px 12px}.hud strong{display:block;color:var(--gold);letter-spacing:.1em;text-transform:uppercase;font-size:.78rem}.hud span{display:block;color:#c7beb0;font-size:.78rem;margin-top:4px}.dot{position:fixed;left:50%;top:50%;width:8px;height:8px;margin:-4px;border:1px solid rgba(255,225,138,.9);border-radius:50%;box-shadow:0 0 12px rgba(255,225,138,.4);pointer-events:none}.chat{position:fixed;right:16px;bottom:16px;width:min(430px,calc(100vw - 32px));max-height:min(520px,70vh);display:none;grid-template-rows:auto 1fr auto;gap:10px;z-index:10}.chat[data-open="true"]{display:grid}.chat h2{margin:0;color:var(--gold);font-size:.8rem;text-transform:uppercase;letter-spacing:.1em}.meta{color:#c7beb0;font-size:.78rem;margin-top:4px}.log{overflow:auto;display:grid;gap:8px;max-height:300px}.msg{border:1px solid rgba(255,255,255,.1);border-radius:13px;padding:9px 10px;line-height:1.36;font-size:.9rem}.user{background:rgba(131,220,255,.08)}.assistant{background:rgba(255,225,138,.08)}.quick{display:flex;flex-wrap:wrap;gap:7px}.quick button{border:1px solid rgba(255,255,255,.12);border-radius:999px;background:rgba(255,255,255,.06);color:#f7eddd;padding:7px 9px;font-size:.78rem;cursor:pointer}.form{display:grid;grid-template-columns:1fr auto auto;gap:8px}.form input{min-width:0;border:1px solid rgba(255,255,255,.14);border-radius:12px;background:rgba(0,0,0,.24);color:white;padding:10px;font:inherit}.form button{border:1px solid rgba(255,225,138,.34);border-radius:12px;background:rgba(255,225,138,.13);color:#ffe18a;font-weight:900;cursor:pointer;padding:10px 12px}.err{position:fixed;left:16px;right:16px;bottom:16px;white-space:pre-wrap;color:#ffd8d2;background:#3b0d09;border:1px solid #ff8e7d;border-radius:14px;padding:12px;font-size:12px;z-index:30}.err[hidden]{display:none}@media(max-width:760px){.chat{left:16px;right:16px;width:auto}.form{grid-template-columns:1fr}.form button{width:100%}}
  </style>
</head>
<body>
  <canvas id="view"></canvas><div class="dot"></div>
  <header class="hud card"><strong>Workshop Assistant</strong><span>WASD move. Click a tool to inspect. E inspect. Settings installs the optional local model.</span></header>
  <section class="chat card" id="chat" data-open="false"><header><h2 id="title">Object chat</h2><div class="meta" id="meta">Select a workshop object.</div></header><div class="log" id="log"></div><div><div class="quick" id="quick"><button data-q="What is this?">What is this?</button><button data-q="How do I use it?">How do I use it?</button><button data-q="What safety issue should I know?">Safety</button><button data-q="What other tools does it work with?">Works with?</button></div><form class="form" id="form"><input id="input" placeholder="Ask about the selected object..." autocomplete="off"/><button>Ask</button><button type="button" id="returnBtn">Return</button></form></div></section>
  <section class="err" id="error" hidden></section>
  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import { createBuildingInteriorKit } from "./building-interior-kit.js";
    import { createWorkshopObjectKit } from "./workshop-object-kit.js";
    import { createObjectFocusKit } from "./object-focus-kit.js";
    import { createOnnxLocalModelKit } from "./onnx-local-model-kit.js";
    import { createLocalModelSettingsKit } from "./local-model-settings-kit.js";

    const canvas=document.querySelector("#view"),errorPanel=document.querySelector("#error"),chat=document.querySelector("#chat"),title=document.querySelector("#title"),meta=document.querySelector("#meta"),log=document.querySelector("#log"),form=document.querySelector("#form"),input=document.querySelector("#input"),quick=document.querySelector("#quick"),returnBtn=document.querySelector("#returnBtn");
    const clock=new THREE.Clock(),keys=new Set();
    let scene,camera,renderer,raycaster,room,workshop,workshopState,focus,model,yaw=0,pitch=0,look=false,hovered=null;

    const mat=(color,opts={})=>new THREE.MeshStandardMaterial({color,roughness:opts.roughness??.5,metalness:opts.metalness??.07,transparent:opts.transparent??false,opacity:opts.opacity??1,emissive:opts.emissive??0,emissiveIntensity:opts.emissiveIntensity??0});
    const materials={wood:mat(0x8b5e34,{roughness:.72}),darkWood:mat(0x322012,{roughness:.84}),wall:mat(0x6f6250,{roughness:.82}),partition:mat(0x4d473d,{roughness:.78}),floor:mat(0x2f281d,{roughness:.86}),floorTrim:mat(0x4a3822,{roughness:.82}),trim:mat(0xae8d5a,{roughness:.6}),metal:mat(0xa7b1b8,{metalness:.65,roughness:.28}),brass:mat(0xffd36e,{metalness:.55,roughness:.25}),glass:mat(0x92ddff,{transparent:true,opacity:.34,roughness:.05,metalness:.1,emissive:0x1d5875,emissiveIntensity:.16}),rubber:mat(0x171b20,{roughness:.8}),paper:mat(0xf4ead0,{roughness:.75}),goldGlow:mat(0xffe18a,{emissive:0xffb000,emissiveIntensity:.85}),redGlow:mat(0xff8e7d,{emissive:0xff311f,emissiveIntensity:.9})};
    function geo(v,i){const g=new THREE.BufferGeometry();g.setAttribute("position",new THREE.Float32BufferAttribute(v.flat(),3));g.setIndex(i);g.computeVertexNormals();return g}
    function boxGeo(w=1,h=1,d=1){const x=w/2,y=h/2,z=d/2;return geo([[-x,-y,-z],[x,-y,-z],[x,y,-z],[-x,y,-z],[-x,-y,z],[x,-y,z],[x,y,z],[-x,y,z]],[0,2,1,0,3,2,4,5,6,4,6,7,0,1,5,0,5,4,1,2,6,1,6,5,2,3,7,2,7,6,3,0,4,3,4,7])}
    function tubeGeo(length=1,radius=.05,radial=14,segments=5){const v=[],idx=[];for(let i=0;i<=segments;i++){const x=-length/2+length*i/segments;for(let j=0;j<radial;j++){const a=Math.PI*2*j/radial;v.push([x,Math.cos(a)*radius,Math.sin(a)*radius])}}for(let i=0;i<segments;i++)for(let j=0;j<radial;j++){const a=i*radial+j,b=i*radial+(j+1)%radial,c=(i+1)*radial+j,d=(i+1)*radial+(j+1)%radial;idx.push(a,c,b,b,c,d)}return geo(v,idx)}
    function gearGeo(teeth=18,root=.24,outer=.34,width=.08){const rings=teeth*2,v=[],idx=[];for(const y of[-width/2,width/2])for(let i=0;i<rings;i++){const rr=i%2?outer:root,a=Math.PI*2*i/rings;v.push([Math.cos(a)*rr,y,Math.sin(a)*rr])}for(let i=0;i<rings;i++){const n=(i+1)%rings,a=i,b=n,c=rings+i,d=rings+n;idx.push(a,c,b,b,c,d)}return geo(v,idx)}
    function helixGeo(){return tubeGeo(.5,.025,12,8)}
    function planeGeo(w=1,h=1){const x=w/2,y=h/2;return geo([[-x,-y,0],[x,-y,0],[x,y,0],[-x,y,0]],[0,1,2,0,2,3])}
    function addMesh(parent,geometry,material,pos={},rot={},scale={x:1,y:1,z:1}){const m=new THREE.Mesh(geometry,material);m.position.set(pos.x??0,pos.y??0,pos.z??0);m.rotation.set(rot.x??0,rot.y??0,rot.z??0);m.scale.set(scale.x??1,scale.y??1,scale.z??1);m.castShadow=true;m.receiveShadow=true;parent.add(m);return m}
    function append(role,text){const node=document.createElement("div");node.className=`msg ${role}`;node.textContent=text;log.appendChild(node);log.scrollTop=log.scrollHeight}
    function hit(){raycaster.setFromCamera({x:0,y:0},camera);const hits=raycaster.intersectObjects(Array.from(workshopState.meshes.values()),true);if(!hits.length)return null;let t=hits[0].object;while(t.parent&&!t.userData.workshopObject)t=t.parent;if(!t.userData.workshopObject)return null;return{id:t.userData.workshopObjectId,object:t.userData.workshopObject,mesh:workshopState.meshes.get(t.userData.workshopObjectId)}}
    async function ask(q){const object=focus.selectedObject;if(!object)return;append("user",q);const result=await model.answer({object,room:room.describeRoom(camera.position),question:q});append("assistant",result.text);input.value=""}
    function inspect(){const target=hit();if(!target){if(focus.selectedObject)closeFocus();return;}document.exitPointerLock?.();look=false;focus.select(target);chat.dataset.open="true";title.textContent=target.object.label;meta.textContent=`${target.object.type} - optional local model in Settings`;log.innerHTML="";append("assistant",target.object.context)}
    function closeFocus(){focus.clear();chat.dataset.open="false"}
    function move(dt){const prev=camera.position.clone(),f=new THREE.Vector3(-Math.sin(yaw),0,-Math.cos(yaw)),b=f.clone().multiplyScalar(-1),r=new THREE.Vector3(Math.cos(yaw),0,-Math.sin(yaw));let m=new THREE.Vector3();if(keys.has("KeyW"))m.add(f);if(keys.has("KeyS"))m.add(b);if(keys.has("KeyA"))m.add(r.clone().multiplyScalar(-1));if(keys.has("KeyD"))m.add(r);if(m.lengthSq()){m.normalize().multiplyScalar(dt*(keys.has("ShiftLeft")?3.4:2.25));camera.position.add(m);room.constrainPlayer(camera.position,prev)}camera.rotation.set(pitch,yaw,0,"YXZ")}
    function boot(){try{scene=new THREE.Scene();camera=new THREE.PerspectiveCamera(68,innerWidth/innerHeight,.05,90);camera.position.set(0,1.58,3.65);renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:false});renderer.setPixelRatio(Math.min(devicePixelRatio||1,2));renderer.setSize(innerWidth,innerHeight);renderer.shadowMap.enabled=true;renderer.outputColorSpace=THREE.SRGBColorSpace;raycaster=new THREE.Raycaster();raycaster.far=4.2;const helpers={addMesh,boxGeo,tubeGeo,gearGeo,helixGeo,planeGeo,materials};room=createBuildingInteriorKit(THREE,helpers);room.build(scene);workshop=createWorkshopObjectKit(THREE,helpers);workshopState=workshop.build(scene);focus=createObjectFocusKit(THREE);model=createOnnxLocalModelKit();createLocalModelSettingsKit({modelKit:model}).create();window.GameHost={room,workshop,focus,model,getState:()=>({hovered,focus:focus.getState(),model:model.getState()})};animate()}catch(e){errorPanel.hidden=false;errorPanel.textContent=String(e?.stack||e)}}
    function animate(){requestAnimationFrame(animate);const dt=Math.min(.04,clock.getDelta());move(dt);hovered=hit()?.id??null;focus.update(camera,dt);renderer.render(scene,camera)}
    canvas.addEventListener("pointerdown",e=>{if(e.target!==canvas)return;if(hit())inspect();else{canvas.requestPointerLock?.();look=true}});canvas.addEventListener("pointermove",e=>{if(!look&&document.pointerLockElement!==canvas)return;yaw-=e.movementX*.0023;pitch=Math.max(-1.05,Math.min(1.05,pitch-e.movementY*.002))});document.addEventListener("pointerlockchange",()=>look=document.pointerLockElement===canvas);addEventListener("keydown",e=>{keys.add(e.code);if(e.code==="KeyE")inspect();if(e.code==="Escape")closeFocus()});addEventListener("keyup",e=>keys.delete(e.code));addEventListener("resize",()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight)});form.addEventListener("submit",e=>{e.preventDefault();ask(input.value.trim()||"What is this?")});quick.addEventListener("click",e=>{if(e.target.dataset.q)ask(e.target.dataset.q)});returnBtn.addEventListener("click",closeFocus);boot();
  </script>
</body>
</html>
