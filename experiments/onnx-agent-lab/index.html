<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Workshop ONNX Agent</title>
<style>
:root{color-scheme:dark;--gold:#ffe18a;--panel:rgba(9,11,13,.72);--line:rgba(255,255,255,.13)}*{box-sizing:border-box}html,body{margin:0;height:100%;overflow:hidden;background:#070605;color:#f4ead0;font-family:Inter,system-ui,sans-serif}#view{position:fixed;inset:0;display:block;cursor:crosshair;opacity:0;transition:opacity 1.1s ease}body.scene-open #view{opacity:1}.veil{position:fixed;inset:0;background:rgba(0,0,0,.78);transition:opacity 1s,visibility 1s}.scene-open .veil{opacity:0;visibility:hidden}.card{border:1px solid var(--line);border-radius:16px;background:var(--panel);box-shadow:0 18px 80px rgba(0,0,0,.34);backdrop-filter:blur(14px);padding:12px 14px}.hud{position:fixed;left:14px;top:12px;z-index:4;opacity:0;transition:opacity .8s}.scene-open .hud{opacity:1}.hud strong,.chat h1,.loader strong{display:block;color:var(--gold);letter-spacing:.1em;text-transform:uppercase;font-size:.78rem}.hud span,.meta,.loader p{display:block;color:#c7beb0;font-size:.8rem;line-height:1.35;margin-top:5px}.dot{position:fixed;left:50%;top:50%;width:8px;height:8px;margin:-4px;border:1px solid rgba(255,225,138,.9);border-radius:50%;box-shadow:0 0 12px rgba(255,225,138,.4);pointer-events:none;opacity:0}.scene-open .dot{opacity:1}.shell{position:fixed;z-index:12;left:50%;top:50%;width:min(620px,calc(100vw - 28px));transform:translate(-50%,-50%);display:grid;gap:10px;transition:all .9s ease}.scene-open .shell{left:auto;top:auto;right:16px;bottom:16px;width:min(430px,calc(100vw - 32px));transform:none}.loader{display:grid;gap:9px}.loader button,.form button,.quick button{border:1px solid rgba(255,225,138,.36);border-radius:999px;background:rgba(255,225,138,.12);color:#ffe18a;padding:9px 12px;font-weight:900;cursor:pointer}.loader button[disabled],.form button[disabled]{opacity:.5;cursor:not-allowed}.bar{height:8px;border-radius:999px;background:rgba(255,255,255,.1);overflow:hidden}.bar span{display:block;height:100%;width:0;background:linear-gradient(90deg,#ffe18a,#9fffc8);transition:width .25s}.chat{display:grid;gap:9px;max-height:min(560px,calc(100vh - 26px))}.log{overflow:auto;display:grid;gap:8px;max-height:310px}.msg{border:1px solid rgba(255,255,255,.1);border-radius:13px;padding:9px 10px;line-height:1.36;font-size:.9rem;white-space:pre-wrap}.user{background:rgba(131,220,255,.08)}.agent{background:rgba(255,225,138,.08)}.form{display:grid;grid-template-columns:1fr auto;gap:8px}.form input{min-width:0;border:1px solid rgba(255,255,255,.14);border-radius:999px;background:rgba(0,0,0,.24);color:#fff;padding:10px 12px}.quick{display:flex;flex-wrap:wrap;gap:7px}.quick button{background:rgba(255,255,255,.06);color:#f7eddd;font-size:.78rem;padding:7px 9px}.err{position:fixed;left:16px;right:16px;bottom:16px;z-index:30;white-space:pre-wrap;color:#ffd8d2;background:#3b0d09;border:1px solid #ff8e7d;border-radius:14px;padding:12px;font-size:12px}.err[hidden]{display:none}@media(max-width:760px){.scene-open .shell{left:14px;right:14px;bottom:14px;width:auto}.form{grid-template-columns:1fr}.form button{width:100%}}
</style></head><body>
<canvas id="view"></canvas><div class="dot"></div><div class="veil"></div><header class="hud card"><strong>Workshop Scene</strong><span>WASD move. Click a tool. Ask the agent about it.</span></header>
<main class="shell"><section class="loader card"><strong>Load ONNX Model</strong><p>The experience starts with the local model. Load it, talk to the agent, then reply yes when it asks to open the scene.</p><div class="meta" id="status">Checking device...</div><div class="bar"><span id="bar"></span></div><button id="load">Load Qwen ONNX Agent</button></section><section class="chat card"><header><h1>ONNX Agent</h1><div class="meta" id="mem">Memory: 0 turns</div></header><div class="log" id="log"></div><div><div class="quick" id="quick"><button data-q="What do you remember?">Memory</button><button data-q="What model are you using?">Model</button><button data-q="yes">Open scene</button></div><form class="form" id="form"><input id="input" disabled placeholder="Load the model first..."/><button id="send" disabled>Send</button></form></div></section></main><section class="err" id="error" hidden></section>
<script type="module">
import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";import{createBuildingInteriorKit}from"./building-interior-kit.js";import{createWorkshopObjectKit}from"./workshop-object-kit.js";import{createObjectFocusKit}from"./object-focus-kit.js";import{createOnnxLocalModelKit}from"./onnx-local-model-kit.js";
const canvas=document.querySelector("#view"),err=document.querySelector("#error"),statusEl=document.querySelector("#status"),bar=document.querySelector("#bar"),loadBtn=document.querySelector("#load"),log=document.querySelector("#log"),mem=document.querySelector("#mem"),form=document.querySelector("#form"),input=document.querySelector("#input"),send=document.querySelector("#send"),quick=document.querySelector("#quick"),clock=new THREE.Clock(),keys=new Set();let scene,camera,renderer,raycaster,room,workshop,workshopState,focus,model,yaw=0,pitch=0,look=false,open=false,currentObject=null,hovered=null;
const mat=(c,o={})=>new THREE.MeshStandardMaterial({color:c,roughness:o.roughness??.5,metalness:o.metalness??.07,transparent:o.transparent??false,opacity:o.opacity??1,emissive:o.emissive??0,emissiveIntensity:o.emissiveIntensity??0}),materials={wood:mat(0x8b5e34,{roughness:.72}),darkWood:mat(0x322012,{roughness:.84}),wall:mat(0x6f6250,{roughness:.82}),partition:mat(0x4d473d,{roughness:.78}),floor:mat(0x2f281d,{roughness:.86}),floorTrim:mat(0x4a3822,{roughness:.82}),trim:mat(0xae8d5a,{roughness:.6}),metal:mat(0xa7b1b8,{metalness:.65,roughness:.28}),brass:mat(0xffd36e,{metalness:.55,roughness:.25}),glass:mat(0x92ddff,{transparent:true,opacity:.34,roughness:.05,metalness:.1,emissive:0x1d5875,emissiveIntensity:.16}),rubber:mat(0x171b20,{roughness:.8}),paper:mat(0xf4ead0,{roughness:.75}),goldGlow:mat(0xffe18a,{emissive:0xffb000,emissiveIntensity:.85}),redGlow:mat(0xff8e7d,{emissive:0xff311f,emissiveIntensity:.9})};
function geo(v,i){const g=new THREE.BufferGeometry();g.setAttribute("position",new THREE.Float32BufferAttribute(v.flat(),3));g.setIndex(i);g.computeVertexNormals();return g}function boxGeo(w=1,h=1,d=1){const x=w/2,y=h/2,z=d/2;return geo([[-x,-y,-z],[x,-y,-z],[x,y,-z],[-x,y,-z],[-x,-y,z],[x,-y,z],[x,y,z],[-x,y,z]],[0,2,1,0,3,2,4,5,6,4,6,7,0,1,5,0,5,4,1,2,6,1,6,5,2,3,7,2,7,6,3,0,4,3,4,7])}function tubeGeo(l=1,r=.05,n=14,s=5){const v=[],idx=[];for(let i=0;i<=s;i++){const x=-l/2+l*i/s;for(let j=0;j<n;j++){const a=Math.PI*2*j/n;v.push([x,Math.cos(a)*r,Math.sin(a)*r])}}for(let i=0;i<s;i++)for(let j=0;j<n;j++){const a=i*n+j,b=i*n+(j+1)%n,c=(i+1)*n+j,d=(i+1)*n+(j+1)%n;idx.push(a,c,b,b,c,d)}return geo(v,idx)}function gearGeo(t=18,root=.24,outer=.34,width=.08){const rings=t*2,v=[],idx=[];for(const y of[-width/2,width/2])for(let i=0;i<rings;i++){const rr=i%2?outer:root,a=Math.PI*2*i/rings;v.push([Math.cos(a)*rr,y,Math.sin(a)*rr])}for(let i=0;i<rings;i++){const n=(i+1)%rings,a=i,b=n,c=rings+i,d=rings+n;idx.push(a,c,b,b,c,d)}return geo(v,idx)}function helixGeo(){return tubeGeo(.5,.025,12,8)}function planeGeo(w=1,h=1){const x=w/2,y=h/2;return geo([[-x,-y,0],[x,-y,0],[x,y,0],[-x,y,0]],[0,1,2,0,2,3])}function addMesh(p,g,m,pos={},rot={},s={x:1,y:1,z:1}){const o=new THREE.Mesh(g,m);o.position.set(pos.x??0,pos.y??0,pos.z??0);o.rotation.set(rot.x??0,rot.y??0,rot.z??0);o.scale.set(s.x??1,s.y??1,s.z??1);o.castShadow=o.receiveShadow=true;p.add(o);return o}
function say(role,text){const n=document.createElement("div");n.className=`msg ${role}`;n.textContent=text;log.appendChild(n);log.scrollTop=log.scrollHeight}function render(s){statusEl.textContent=`${s.modelName} / ${s.quantization} - ${s.status} - ${s.backend}`;bar.style.width=`${s.progress||0}%`;mem.textContent=`Memory: ${s.memoryCount||0} turns`;if(s.status==="cached"||s.status==="ready")enable()}function enable(){input.disabled=send.disabled=false;input.placeholder="Talk to the ONNX agent...";if(!log.dataset.ready){log.dataset.ready=1;say("agent","Model memory is online. I will remember the last few things you say. Do you want to open the workshop scene?")}}async function loadModel(){loadBtn.disabled=true;loadBtn.textContent="Loading...";say("agent","Loading the ONNX model.");const s=await model.install();loadBtn.textContent=s.status==="failed"?"Retry Load":"Model Loaded";loadBtn.disabled=s.status!=="failed";if(s.status==="failed")say("agent",`Load failed: ${s.lastError||s.message}`);else enable()}function openScene(){open=true;document.body.classList.add("scene-open");say("agent","Opening the scene now. I will move to the right and stay with you while you inspect tools.")}function hit(){raycaster.setFromCamera({x:0,y:0},camera);const hits=raycaster.intersectObjects(Array.from(workshopState.meshes.values()),true);if(!hits.length)return null;let t=hits[0].object;while(t.parent&&!t.userData.workshopObject)t=t.parent;if(!t.userData.workshopObject)return null;return{id:t.userData.workshopObjectId,object:t.userData.workshopObject,mesh:workshopState.meshes.get(t.userData.workshopObjectId)}}function inspect(){const h=hit();if(!h)return;document.exitPointerLock?.();look=false;currentObject=h.object;focus.select(h);say("agent",`I have ${h.object.label} in focus. Ask me about it.`)}async function ask(text){const clean=text.trim();if(!clean)return;say("user",clean);input.value="";const r=await model.chat({text:clean,object:currentObject,room:room.describeRoom(camera.position)});say("agent",r.text);if(r.wantsScene&&!open)openScene()}
function move(dt){if(!open)return;const prev=camera.position.clone(),f=new THREE.Vector3(-Math.sin(yaw),0,-Math.cos(yaw)),b=f.clone().multiplyScalar(-1),r=new THREE.Vector3(Math.cos(yaw),0,-Math.sin(yaw));let m=new THREE.Vector3();if(keys.has("KeyW"))m.add(f);if(keys.has("KeyS"))m.add(b);if(keys.has("KeyA"))m.add(r.clone().multiplyScalar(-1));if(keys.has("KeyD"))m.add(r);if(m.lengthSq()){m.normalize().multiplyScalar(dt*(keys.has("ShiftLeft")?3.4:2.25));camera.position.add(m);room.constrainPlayer(camera.position,prev)}camera.rotation.set(pitch,yaw,0,"YXZ")}function boot(){try{model=createOnnxLocalModelKit();model.subscribe(render);scene=new THREE.Scene();camera=new THREE.PerspectiveCamera(68,innerWidth/innerHeight,.05,90);camera.position.set(0,1.58,3.65);renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:false});renderer.setPixelRatio(Math.min(devicePixelRatio||1,2));renderer.setSize(innerWidth,innerHeight);renderer.shadowMap.enabled=true;renderer.outputColorSpace=THREE.SRGBColorSpace;raycaster=new THREE.Raycaster();raycaster.far=4.2;const helpers={addMesh,boxGeo,tubeGeo,gearGeo,helixGeo,planeGeo,materials};room=createBuildingInteriorKit(THREE,helpers);room.build(scene);workshop=createWorkshopObjectKit(THREE,helpers);workshopState=workshop.build(scene);focus=createObjectFocusKit(THREE);window.GameHost={room,workshop,focus,model,getState:()=>({open,hovered,currentObject:currentObject?.label||null,focus:focus.getState(),model:model.getState()})};say("agent","Load the ONNX model to start.");animate()}catch(e){err.hidden=false;err.textContent=String(e?.stack||e)}}function animate(){requestAnimationFrame(animate);const dt=Math.min(.04,clock.getDelta());move(dt);hovered=open?hit()?.id??null:null;focus.update(camera,dt);renderer.render(scene,camera)}
loadBtn.addEventListener("click",loadModel);form.addEventListener("submit",e=>{e.preventDefault();ask(input.value)});quick.addEventListener("click",e=>{if(e.target.dataset.q)ask(e.target.dataset.q)});canvas.addEventListener("pointerdown",e=>{if(!open||e.target!==canvas)return;if(hit())inspect();else{canvas.requestPointerLock?.();look=true}});canvas.addEventListener("pointermove",e=>{if(!open||(!look&&document.pointerLockElement!==canvas))return;yaw-=e.movementX*.0023;pitch=Math.max(-1.05,Math.min(1.05,pitch-e.movementY*.002))});document.addEventListener("pointerlockchange",()=>look=document.pointerLockElement===canvas);addEventListener("keydown",e=>{keys.add(e.code);if(e.code==="KeyE"&&open)inspect();if(e.code==="Escape"&&open){focus.clear();currentObject=null}});addEventListener("keyup",e=>keys.delete(e.code));addEventListener("resize",()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight)});boot();
</script></body></html>
