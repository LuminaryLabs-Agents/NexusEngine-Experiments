  <style>
    :root{color-scheme:dark;--bg:#07090d;--panel:rgba(16,20,28,.82);--line:rgba(255,255,255,.12);--gold:#ffe18a;--cyan:#9fffc8;--text:#f7eddd;--muted:#b9c1c8}*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:radial-gradient(circle at 30% 0%,rgba(159,255,200,.16),transparent 34%),linear-gradient(180deg,#080a0f,#050609 70%);color:var(--text);font-family:Inter,system-ui,sans-serif}body{overflow:auto}.wrap{width:min(1180px,calc(100% - 28px));margin:0 auto;padding:22px 0 38px}.card{border:1px solid var(--line);border-radius:22px;background:linear-gradient(180deg,rgba(255,255,255,.065),rgba(255,255,255,.028)),var(--panel);box-shadow:0 18px 60px rgba(0,0,0,.32);backdrop-filter:blur(14px)}.hero{padding:22px}.eyebrow{margin:0 0 8px;color:var(--gold);font-size:.76rem;font-weight:900;letter-spacing:.12em;text-transform:uppercase}.hero h1{margin:0;max-width:850px;font-size:clamp(2rem,5vw,4.6rem);line-height:.94;letter-spacing:-.06em}.summary{max-width:720px;color:var(--muted);line-height:1.45}.meter{height:12px;overflow:hidden;border-radius:999px;background:rgba(255,255,255,.1)}.meter span{display:block;height:100%;border-radius:inherit;background:linear-gradient(90deg,var(--gold),var(--cyan));transition:width .24s ease}.readout{font-weight:900;color:var(--cyan)}.actions{display:flex;flex-wrap:wrap;gap:9px}.actions button,.tool{border:1px solid rgba(255,225,138,.36);border-radius:999px;background:rgba(255,225,138,.1);color:var(--text);padding:10px 13px;font-weight:900;cursor:pointer}.bench{position:relative;height:390px;margin-top:14px;overflow:hidden;background:radial-gradient(circle at 50% 48%,rgba(255,225,138,.12),transparent 24%),linear-gradient(135deg,rgba(159,255,200,.08),rgba(255,255,255,.02))}.bench:before{content:"";position:absolute;inset:34px;border:1px dashed rgba(255,255,255,.16);border-radius:28px}.tool{position:absolute;left:var(--x);top:var(--y);width:168px;min-height:72px;transform:translate(-50%,-50%);border-radius:18px;text-align:left;background:rgba(7,9,13,.8)}.tool.active{border-color:var(--cyan);box-shadow:0 0 32px rgba(159,255,200,.2)}.tool b,.tool span{display:block}.tool span{margin-top:4px;color:var(--muted);font-size:.78rem}.selected{position:absolute;left:18px;bottom:16px;color:var(--gold);font-weight:900}.grid{display:grid;grid-template-columns:1.35fr .75fr;gap:14px;margin-top:14px}.descriptors,.ledger{padding:16px}.descriptors h2,.ledger h2{margin:0 0 12px;color:var(--gold);font-size:.86rem;letter-spacing:.1em;text-transform:uppercase}.descriptor-card{display:grid;gap:4px;padding:10px 0;border-top:1px solid var(--line)}.descriptor-card strong{color:var(--cyan);font-size:.82rem}.descriptor-card span{font-weight:900}.descriptor-card small,.ledger p{margin:0;color:var(--muted);line-height:1.38}.ledger{display:grid;align-content:start;gap:10px}@media(max-width:860px){.grid{grid-template-columns:1fr}.bench{height:520px}.tool{width:150px}.hero h1{font-size:2.35rem}}
