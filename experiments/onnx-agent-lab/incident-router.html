  <style>
    :root{color-scheme:dark;--bg:#06080d;--panel:rgba(15,20,30,.84);--line:rgba(255,255,255,.13);--gold:#ffd979;--cyan:#9dfbff;--mint:#a9ffc6;--rose:#ff9d9d;--text:#f8efe3;--muted:#aeb9c6}*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:radial-gradient(circle at 24% 0%,rgba(157,251,255,.17),transparent 32%),radial-gradient(circle at 80% 20%,rgba(255,157,157,.12),transparent 34%),linear-gradient(180deg,#07090f,#030407 72%);color:var(--text);font-family:Inter,system-ui,sans-serif}body{overflow:auto}.wrap{width:min(1180px,calc(100% - 28px));margin:0 auto;padding:22px 0 40px}.card{border:1px solid var(--line);border-radius:22px;background:linear-gradient(180deg,rgba(255,255,255,.065),rgba(255,255,255,.026)),var(--panel);box-shadow:0 18px 70px rgba(0,0,0,.34);backdrop-filter:blur(14px)}.hero{padding:22px}.eyebrow{margin:0 0 8px;color:var(--gold);font-size:.76rem;font-weight:900;letter-spacing:.13em;text-transform:uppercase}.hero h1{margin:0;max-width:880px;font-size:clamp(2rem,5vw,4.75rem);line-height:.94;letter-spacing:-.065em}.summary{max-width:780px;color:var(--muted);line-height:1.45}.meter{height:12px;overflow:hidden;border-radius:999px;background:rgba(255,255,255,.1)}.meter span{display:block;height:100%;border-radius:inherit;background:linear-gradient(90deg,var(--rose),var(--gold),var(--cyan));transition:width .22s ease}.readout{font-weight:900;color:var(--cyan)}.actions{display:flex;flex-wrap:wrap;gap:9px}.actions button{border:1px solid rgba(255,217,121,.36);border-radius:999px;background:rgba(255,217,121,.1);color:var(--text);padding:10px 13px;font-weight:900;cursor:pointer}.desk{position:relative;height:430px;margin-top:14px;overflow:hidden;background:radial-gradient(circle at 50% 50%,rgba(157,251,255,.12),transparent 24%),linear-gradient(135deg,rgba(255,217,121,.08),rgba(255,255,255,.02))}.radar-rings{position:absolute;inset:36px;border:1px dashed rgba(255,255,255,.15);border-radius:30px}.radar-rings:before,.radar-rings:after{content:"";position:absolute;inset:15%;border:1px solid rgba(157,251,255,.10);border-radius:inherit}.radar-rings:after{inset:31%;border-color:rgba(255,217,121,.12)}.beacon,.operator,.brief,.trace,.lane{position:absolute;transform:translate(-50%,-50%)}.beacon{left:var(--x);top:var(--y);padding:7px 9px;border-radius:999px;background:rgba(255,157,157,calc(.12 + var(--u)*.28));border:1px solid rgba(255,157,157,.42);font-size:.68rem;text-transform:uppercase}.beacon.acked{background:rgba(169,255,198,.13);border-color:rgba(169,255,198,.42)}.trace{left:var(--x);top:var(--y);width:28px;height:28px;border-radius:50%;background:rgba(157,251,255,calc(.12 + var(--q)*.4));box-shadow:0 0 calc(14px + var(--q)*34px) rgba(157,251,255,.22)}.lane{left:calc((var(--x1) + var(--x2))/2);top:var(--y);width:110px;height:2px;background:rgba(157,251,255,calc(.16 + var(--c)*.46));font-size:.68rem;text-transform:uppercase;color:var(--muted);padding-top:6px}.lane.manual{background:rgba(255,157,157,.46)}.lane.review{background:rgba(255,217,121,.46)}.brief{left:var(--x);top:var(--y);width:30px;height:30px;display:grid;place-items:center;border-radius:9px;border:1px solid rgba(255,217,121,.42);background:rgba(255,217,121,calc(.08 + var(--c)*.22));font-style:normal;font-weight:900}.operator{left:var(--x);top:var(--y);padding:8px 9px;border-radius:12px;border:1px solid rgba(169,255,198,.34);background:rgba(169,255,198,calc(.08 + (1 - var(--l))*.28));font-size:.7rem;text-transform:uppercase}.operator.loaded{border-color:rgba(255,157,157,.35);background:rgba(255,157,157,calc(.08 + var(--l)*.26))}.grid{display:grid;grid-template-columns:1.25fr .8fr;gap:14px;margin-top:14px}.descriptors,.ledger{padding:16px}.descriptors h2,.ledger h2{margin:0 0 12px;color:var(--gold);font-size:.86rem;letter-spacing:.1em;text-transform:uppercase}.descriptor-card{display:grid;grid-template-columns:1fr auto;gap:4px;padding:10px 0;border-top:1px solid var(--line)}.descriptor-card strong{color:var(--cyan);font-size:.82rem}.descriptor-card span{font-weight:900}.descriptor-card small,.ledger p{grid-column:1/-1;margin:0;color:var(--muted);line-height:1.38}.ledger{display:grid;align-content:start;gap:10px}@media(max-width:860px){.grid{grid-template-columns:1fr}.desk{height:520px}.hero h1{font-size:2.4rem}}
  </style>
