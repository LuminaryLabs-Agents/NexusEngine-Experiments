<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cozy Island</title>
</head>
<body style="margin:0;overflow:hidden;background:#f3cfa6;color:white;font-family:system-ui,sans-serif">
<canvas id="game" style="position:fixed;inset:0;width:100%;height:100%;display:block"></canvas>
<div id="cloud-loader" style="position:fixed;left:50%;bottom:32px;transform:translateX(-50%);z-index:4;width:min(360px,70vw);padding:14px 16px;border-radius:18px;background:rgba(22,38,42,.72);transition:opacity .45s ease;pointer-events:none">
<div style="font-size:12px;font-weight:800;margin-bottom:8px;color:white">Cozy Cloud Loading</div>
<div style="height:8px;border-radius:999px;background:rgba(255,255,255,.22);overflow:hidden"><div id="cloud-loader-fill" style="height:100%;width:0%;border-radius:999px;background:white;transition:width .25s ease"></div></div>
</div>
<pre id="error" hidden></pre>
<script type="module" src="./cozy-island-cloudbar.js?v=cloudbar-1"></script>
</body>
</html>
