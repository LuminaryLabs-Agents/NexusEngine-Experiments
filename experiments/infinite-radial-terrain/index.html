<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Experimental camera-relative radial terrain tessellation, expedition readability, wayfinding, survey contract, basecamp resupply, avalanche rescue, observatory evacuation, skybridge shelter, and aquifer cartography route-planning demo for NexusEngine." />
  <title>Infinite Radial Terrain</title>
  <style>
    html,body{margin:0;height:100%;overflow:hidden;background:#bfe7ff;color:#10202a;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    #game{width:100vw;height:100vh;display:block;touch-action:none;cursor:crosshair}
    .hud{position:fixed;left:16px;bottom:16px;z-index:2;max-width:min(660px,calc(100vw - 32px));padding:10px 12px;border-radius:16px;background:rgba(3,10,16,.82);-webkit-backdrop-filter:blur(12px) saturate(1.2);backdrop-filter:blur(12px) saturate(1.2);color:#fff;font-size:12px;letter-spacing:.02em;line-height:1.4;text-shadow:0 2px 14px rgba(0,0,0,.82);pointer-events:none;box-shadow:0 18px 60px rgba(0,0,0,.34),inset 0 0 0 1px rgba(255,255,255,.18)}
    .hud strong{color:#fff1a8;font-weight:900}
    #error{position:fixed;inset:16px;z-index:4;overflow:auto;white-space:pre-wrap;padding:16px;color:#fff1ea;background:rgba(42,4,2,.94);border:0;border-radius:18px;box-shadow:0 22px 80px rgba(0,0,0,.54),inset 0 0 0 1px rgba(255,210,190,.22)}
    #error[hidden]{display:none}
    @media (prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important;scroll-behavior:auto!important}}
  </style>
</head>
<body>
  <canvas id="game" aria-label="Infinite Radial Terrain expedition, wayfinding, survey contract, basecamp resupply, avalanche rescue, observatory evacuation, skybridge shelter, and aquifer cartography readability demo"></canvas>
  <div class="hud" id="hud"><strong>Infinite Radial Terrain</strong><br>WASD fly · Space up · Shift down · drag mouse look · ` logs state · expedition + wayfinding + survey contract + basecamp resupply + avalanche rescue + observatory evacuation + skybridge shelter + aquifer cartography descriptors enabled</div>
  <pre id="error" hidden></pre>
  <main id="app" data-terrain-pass="expedition-readability-renderer-handoff-pass wayfinding-readability-renderer-handoff-pass survey-contract-readiness-renderer-handoff-pass basecamp-resupply-readiness-renderer-handoff-pass avalanche-rescue-readiness-renderer-handoff-pass observatory-evacuation-readiness-renderer-handoff-pass skybridge-shelter-readiness-renderer-handoff-pass aquifer-cartography-readiness-renderer-handoff-pass" hidden></main>
  <script type="module" src="./infinite-radial-terrain.js?v=infinite-radial-terrain-expedition-readability-v1"></script>
  <script type="module" src="./terrain-wayfinding-readability-entry.js?v=infinite-radial-terrain-wayfinding-readability-v1"></script>
  <script type="module" src="./terrain-survey-contract-readiness-entry.js?v=infinite-radial-terrain-survey-contract-readiness-v1"></script>
  <script type="module" src="./terrain-basecamp-resupply-readiness-entry.js?v=infinite-radial-terrain-basecamp-resupply-readiness-v1"></script>
  <script type="module" src="./terrain-avalanche-rescue-readiness-entry.js?v=infinite-radial-terrain-avalanche-rescue-readiness-v1"></script>
  <script type="module" src="./terrain-observatory-evacuation-readiness-entry.js?v=infinite-radial-terrain-observatory-evacuation-readiness-v1"></script>
  <script type="module" src="./terrain-skybridge-shelter-readiness-entry.js?v=infinite-radial-terrain-skybridge-shelter-readiness-v1"></script>
  <script type="module" src="./terrain-aquifer-cartography-readiness-entry.js?v=infinite-radial-terrain-aquifer-cartography-readiness-v1"></script>
</body>
</html>
