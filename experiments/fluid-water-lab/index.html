<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="description" content="NexusRealtime fluid/water domain experiment composed from flat fluid and water ProtoKits." />
  <title>Fluid Water Lab — NexusRealtime</title>
  <style>
    :root{color-scheme:dark;--text:#effcff;--muted:#a8d2dd;--gold:#ffe77a;--blue:#73d9ff}
    html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#02090d;color:var(--text);font-family:Inter,ui-sans-serif,system-ui,sans-serif}
    main,canvas{position:fixed;inset:0;width:100%;height:100%;display:block}
    #hud{position:fixed;z-index:3;inset:16px auto auto 16px;display:grid;gap:8px;pointer-events:none;text-shadow:0 2px 16px #00131d}
    #title{max-width:min(650px,calc(100vw - 32px));padding:10px 13px;border:1px solid rgba(115,217,255,.28);border-radius:16px;background:linear-gradient(180deg,rgba(8,24,34,.58),rgba(3,10,15,.26));box-shadow:0 18px 60px rgba(0,0,0,.34),inset 0 1px 0 rgba(255,255,255,.08);backdrop-filter:blur(16px);font-weight:950;letter-spacing:.08em;text-transform:uppercase;font-size:.78rem}
    #title strong{color:var(--gold)}
    #status{max-width:min(760px,calc(100vw - 32px));padding:8px 12px;border-radius:999px;background:rgba(3,10,15,.36);color:var(--muted);font-size:.78rem}
    #errorPanel{position:fixed;z-index:5;inset:auto 18px 18px 18px;max-height:45vh;overflow:auto;white-space:pre-wrap;padding:14px;border:1px solid rgba(255,120,90,.55);border-radius:18px;color:#ffe9e4;background:rgba(35,8,4,.86);box-shadow:0 20px 80px rgba(0,0,0,.48)}
    #errorPanel[hidden]{display:none}
  </style>
</head>
<body>
  <main id="app" aria-label="Fluid water domain lab">
    <canvas id="game" role="application" aria-label="Fluid and water kit experiment"></canvas>
    <aside id="hud" aria-label="Minimal water lab HUD">
      <div id="title"><strong>Fluid Water Lab</strong> · flat kit composition</div>
      <div id="status">loading fluid/water kits…</div>
    </aside>
    <section id="errorPanel" role="alert" hidden></section>
  </main>
  <script type="module" src="./src/main.js?v=fluid-water-kits-20260619"></script>
</body>
</html>
