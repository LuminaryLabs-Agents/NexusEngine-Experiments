<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>VR Platformer Board · NexusEngine</title>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; background: radial-gradient(circle at 50% 30%, #24324f, #070a11 58%, #020306); color: white; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    main, canvas { position: fixed; inset: 0; width: 100vw; height: 100vh; }
    canvas { display: block; }
    #hud { position: fixed; left: 16px; top: 14px; right: 16px; display: flex; justify-content: space-between; gap: 12px; pointer-events: none; font-size: 12px; letter-spacing: 0.04em; text-transform: uppercase; color: rgba(255,255,255,0.78); }
    #hud span { background: rgba(0,0,0,0.24); border: 1px solid rgba(255,255,255,0.12); border-radius: 999px; padding: 7px 10px; backdrop-filter: blur(10px); box-shadow: 0 0 26px rgba(97, 186, 255, 0.12); }
    #hud[data-tone="warning"] span { border-color: rgba(255, 200, 120, 0.42); color: #ffe6b0; }
    #hud[data-tone="success"] span { border-color: rgba(142, 255, 173, 0.44); color: #d9ffe3; }
    #errorPanel { position: fixed; left: 16px; right: 16px; bottom: 16px; padding: 14px; border-radius: 14px; background: rgba(80, 0, 0, 0.86); color: white; white-space: pre-wrap; font-size: 13px; }
    #errorPanel[hidden] { display: none; }
  </style>
</head>
<body>
  <main id="app">
    <canvas id="game" role="application" aria-label="VR platformer board experiment"></canvas>
    <aside id="hud" aria-label="Game HUD" data-tone="neutral">
      <span id="objective">Booting kits…</span>
      <span id="controls">A/D move · Space jump · R reset · drag head</span>
    </aside>
    <section id="errorPanel" role="alert" hidden></section>
  </main>

  <script type="module">
    import {
      createVrBoardAtmosphericDomeKit,
      createVrBoardChallengeDirectorKit,
      createVrBoardCollectibleConstellationKit,
      createVrBoardComfortFocusKit,
      createVrBoardCompositionKit,
      createVrBoardDepthLaneKit,
      createVrBoardHazardTelemetryKit,
      createVrBoardHudDescriptorKit,
      createVrBoardMotionTrailKit,
      createVrBoardPlatformReliefKit,
      createVrBoardRendererHandoffKit,
      createVrBoardWorldSeedKit
    } from "../_kits/vr-platformer-board/vr-platformer-board-kits.js";

    const NEXUS_URL = "https://cdn.jsdelivr.net/gh/LuminaryLabs-Dev/NexusEngine@main/src/index.js";
    const PROTOKITS = "https://cdn.jsdelivr.net/gh/LuminaryLabs-Agents/NexusRealtime-ProtoKits@main/protokits";

    const canvas = document.querySelector("#game");
    const ctx = canvas.getContext("2d");
    const objective = document.querySelector("#objective");
    const controls = document.querySelector("#controls");
    const hud = document.querySelector("#hud");
    const errorPanel = document.querySelector("#errorPanel");

    const boardWorldSeedKit = createVrBoardWorldSeedKit();
    const boardChallengeDirectorKit = createVrBoardChallengeDirectorKit();
    const boardDepthLaneKit = createVrBoardDepthLaneKit({ laneCount: 7 });
    const boardAtmosphericDomeKit = createVrBoardAtmosphericDomeKit({ bandCount: 7, moteCount: 22 });
    const boardPlatformReliefKit = createVrBoardPlatformReliefKit();
    const boardHazardTelemetryKit = createVrBoardHazardTelemetryKit();
    const boardCollectibleConstellationKit = createVrBoardCollectibleConstellationKit();
    const boardComfortFocusKit = createVrBoardComfortFocusKit();
    const boardMotionTrailKit = createVrBoardMotionTrailKit({ ghostCount: 8 });
    const boardRendererHandoffKit = createVrBoardRendererHandoffKit({
      atmosphericDomeKit: boardAtmosphericDomeKit,
      platformReliefKit: boardPlatformReliefKit,
      hazardTelemetryKit: boardHazardTelemetryKit,
      collectibleConstellationKit: boardCollectibleConstellationKit,
      comfortFocusKit: boardComfortFocusKit,
      motionTrailKit: boardMotionTrailKit
    });
    const boardHudDescriptorKit = createVrBoardHudDescriptorKit();
    const boardCompositionKit = createVrBoardCompositionKit({
      worldSeedKit: boardWorldSeedKit,
      challengeDirectorKit: boardChallengeDirectorKit,
      depthLaneKit: boardDepthLaneKit,
      atmosphericDomeKit: boardAtmosphericDomeKit,
      platformReliefKit: boardPlatformReliefKit,
      hazardTelemetryKit: boardHazardTelemetryKit,
      collectibleConstellationKit: boardCollectibleConstellationKit,
      comfortFocusKit: boardComfortFocusKit,
      motionTrailKit: boardMotionTrailKit,
      rendererHandoffKit: boardRendererHandoffKit,
      hudDescriptorKit: boardHudDescriptorKit
    });

    let latestBoardComposition = null;

    function showFatal(error) {
      errorPanel.hidden = false;
      errorPanel.textContent = String(error?.stack ?? error?.message ?? error);
    }

    const keys = new Set();
    const head = { position: { x: 0, y: 1.6, z: 0 }, forward: { x: 0, y: 0, z: -1 }, up: { x: 0, y: 1, z: 0 } };
    let dragging = false;
    let lastPointer = null;

    addEventListener("keydown", (event) => keys.add(event.key.toLowerCase()));
    addEventListener("keyup", (event) => keys.delete(event.key.toLowerCase()));
    addEventListener("blur", () => keys.clear());
    canvas.addEventListener("pointerdown", (event) => { dragging = true; lastPointer = { x: event.clientX, y: event.clientY }; canvas.setPointerCapture?.(event.pointerId); });
    canvas.addEventListener("pointerup", () => { dragging = false; lastPointer = null; });
    canvas.addEventListener("pointermove", (event) => {
      if (!dragging || !lastPointer) return;
      const dx = event.clientX - lastPointer.x;
      const dy = event.clientY - lastPointer.y;
      lastPointer = { x: event.clientX, y: event.clientY };
      head.position.x = Math.max(-0.22, Math.min(0.22, head.position.x + dx * 0.0012));
      head.position.y = Math.max(1.35, Math.min(1.9, head.position.y - dy * 0.0012));
    });

    function resize() {
      const dpr = Math.min(devicePixelRatio || 1, 2);
      canvas.width = Math.floor(innerWidth * dpr);
      canvas.height = Math.floor(innerHeight * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    addEventListener("resize", resize);
    resize();

    function drawBoard(snapshot) {
      const w = innerWidth;
      const h = innerHeight;
      ctx.clearRect(0, 0, w, h);
      const headX = snapshot.xrPose?.head?.position?.x ?? 0;
      const headY = snapshot.xrPose?.head?.position?.y ?? 1.6;
      const board = snapshot.board ?? { sizeMeters: { x: 1.6, y: 0.9 } };
      const scale = Math.min(w * 0.72 / 320, h * 0.68 / 180);
      const bw = 320 * scale;
      const bh = 180 * scale;
      const cx = w * 0.5 - headX * 180;
      const cy = h * 0.52 + (1.6 - headY) * 120;
      const left = cx - bw / 2;
      const top = cy - bh / 2;
      const composition = snapshot.boardComposition ?? { world: null, depthLanes: [], challenge: null, visual: {} };

      drawRoomGlow(composition, cx, cy, bw, bh);

      ctx.save();
      ctx.translate(left, top);
      ctx.scale(scale, scale);
      ctx.fillStyle = "rgba(7,10,18,0.94)";
      roundRect(ctx, -8, -8, 336, 196, 12);
      ctx.fill();
      ctx.strokeStyle = "rgba(150,210,255,0.55)";
      ctx.lineWidth = 1.2 / scale;
      ctx.stroke();

      ctx.save();
      ctx.beginPath();
      roundRect(ctx, 0, 0, 320, 180, 7);
      ctx.clip();
      ctx.fillStyle = "#111b30";
      ctx.fillRect(0, 0, 320, 180);
      ctx.fillStyle = "#1f3155";
      ctx.fillRect(0, 120, 320, 60);

      drawAtmosphericDome(composition);
      drawBoardDepth(composition);
      drawBoardSkyline(composition);

      ctx.fillStyle = "rgba(255,255,255,0.05)";
      for (let i = 0; i < 14; i++) ctx.fillRect(i * 28 - (snapshot.camera?.position?.x ?? 0) * 2 % 28, 24 + Math.sin(i) * 8, 20, 80);

      const render = snapshot.render?.descriptors ?? [];
      const cameraX = snapshot.camera?.position?.x ?? 0;
      const cameraY = snapshot.camera?.position?.y ?? 0;
      drawPlatformRelief(composition, cameraX, cameraY);
      drawCollectibleConstellation(composition, cameraX, cameraY);
      drawPlatformAuras(composition, cameraX, cameraY);
      drawMotionTrail(composition, cameraX, cameraY);
      for (const item of render) drawDescriptor(item, cameraX, cameraY);
      drawCollectibleOrbits(composition, cameraX, cameraY);
      drawHazardTelemetry(composition, cameraX, cameraY);
      drawChallengeStrip(composition);
      drawComfortFocus(composition);
      ctx.restore();

      ctx.fillStyle = "rgba(255,255,255,0.8)";
      ctx.font = "5px ui-sans-serif";
      const descriptorCount = composition.visual?.rendererHandoff?.counts?.total ?? 0;
      ctx.fillText(`board ${board.sizeMeters?.x ?? 1.6}m · stereo eyes ${snapshot.stereo?.views?.length ?? 0} · ${descriptorCount} descriptors`, 4, 192);
      ctx.restore();
    }

    function drawRoomGlow(composition, cx, cy, bw, bh) {
      const pressure = composition.visual?.atmosphericDome?.pressure ?? 0.2;
      const gradient = ctx.createRadialGradient(cx, cy - bh * 0.8, 20, cx, cy, Math.max(bw, bh));
      gradient.addColorStop(0, `rgba(91, 159, 255, ${0.22 + pressure * 0.16})`);
      gradient.addColorStop(0.6, `rgba(157, 106, 255, ${0.08 + pressure * 0.08})`);
      gradient.addColorStop(1, "rgba(0,0,0,0)");
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, innerWidth, innerHeight);
    }

    function drawAtmosphericDome(composition) {
      const dome = composition.visual?.atmosphericDome;
      if (!dome) return;
      for (const band of dome.skyBands ?? []) {
        ctx.fillStyle = band.hue === "cyan" ? `rgba(90, 222, 255, ${band.opacity})` : `rgba(166, 118, 255, ${band.opacity})`;
        roundRect(ctx, -20 + band.drift * 12, band.y, 360, band.height, 18);
        ctx.fill();
      }
      for (const mote of dome.motes ?? []) {
        ctx.fillStyle = `rgba(220, 245, 255, ${mote.alpha})`;
        ctx.beginPath();
        ctx.arc(mote.x, mote.y, mote.radius, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function drawBoardDepth(composition) {
      for (const lane of composition.depthLanes ?? []) {
        ctx.strokeStyle = `rgba(130, 190, 255, ${lane.opacity})`;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.ellipse(160 + lane.offset * 42, 124 + lane.depth * 5, lane.width * 24, 14 + lane.depth * 2, 0, 0, Math.PI * 2);
        ctx.stroke();
      }
    }

    function drawBoardSkyline(composition) {
      const skyline = composition.world?.skyline ?? [];
      for (const tower of skyline) {
        ctx.fillStyle = `rgba(150, 190, 255, ${tower.alpha})`;
        ctx.fillRect(tower.x, tower.y, 16, tower.h);
      }
    }

    function drawPlatformRelief(composition, cameraX, cameraY) {
      for (const relief of composition.visual?.platformRelief ?? []) {
        const p = worldToScreen(relief.x, relief.y, cameraX, cameraY);
        ctx.fillStyle = `rgba(0, 0, 0, ${0.18 + relief.shadowDrop})`;
        roundRect(ctx, p.x + 4, p.y - relief.h * 18 + 5, relief.w * 18, relief.h * 18 + 6, 3);
        ctx.fill();
        ctx.strokeStyle = `rgba(160, 226, 255, ${Math.min(0.78, relief.rim)})`;
        ctx.lineWidth = 1;
        ctx.strokeRect(p.x, p.y - relief.h * 18 - 1, relief.w * 18, 2);
      }
    }

    function drawPlatformAuras(composition, cameraX, cameraY) {
      for (const aura of composition.world?.platformAuras ?? []) {
        const p = worldToScreen(aura.x, aura.y, cameraX, cameraY);
        ctx.fillStyle = `rgba(88, 231, 255, ${aura.pulse * 0.16})`;
        roundRect(ctx, p.x - 3, p.y - aura.h * 18 - 5, aura.w * 18 + 6, aura.h * 18 + 10, 4);
        ctx.fill();
      }
    }

    function drawMotionTrail(composition, cameraX, cameraY) {
      for (const ghost of composition.visual?.motionTrail?.ghosts ?? []) {
        const p = worldToScreen(ghost.x, ghost.y, cameraX, cameraY);
        ctx.fillStyle = `rgba(255, 255, 255, ${ghost.alpha})`;
        roundRect(ctx, p.x - 3 * ghost.scale, p.y - 11 * ghost.scale, 8 * ghost.scale, 13 * ghost.scale, 3);
        ctx.fill();
      }
    }

    function drawCollectibleConstellation(composition, cameraX, cameraY) {
      const constellation = composition.visual?.collectibleConstellation;
      if (!constellation) return;
      const byId = new Map((constellation.nodes ?? []).map((node) => [node.id, node]));
      ctx.strokeStyle = "rgba(255, 226, 119, 0.22)";
      for (const link of constellation.links ?? []) {
        const a = byId.get(link.from);
        const b = byId.get(link.to);
        if (!a || !b) continue;
        const pa = worldToScreen(a.x, a.y, cameraX, cameraY);
        const pb = worldToScreen(b.x, b.y, cameraX, cameraY);
        ctx.globalAlpha = link.alpha;
        ctx.beginPath();
        ctx.moveTo(pa.x, pa.y);
        ctx.lineTo(pb.x, pb.y);
        ctx.stroke();
        ctx.globalAlpha = 1;
      }
      for (const node of constellation.nodes ?? []) {
        const p = worldToScreen(node.x, node.y, cameraX, cameraY);
        ctx.fillStyle = `rgba(255, 226, 119, ${node.sparkle})`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 2.5 + node.orbit * 5, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function drawCollectibleOrbits(composition, cameraX, cameraY) {
      for (const orbit of composition.world?.collectibleOrbits ?? []) {
        const p = worldToScreen(orbit.x, orbit.y, cameraX, cameraY);
        ctx.strokeStyle = "rgba(255, 230, 120, 0.42)";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(p.x, p.y, orbit.radius * 18, 0, Math.PI * 2);
        ctx.stroke();
      }
    }

    function drawHazardTelemetry(composition, cameraX, cameraY) {
      for (const hazard of composition.visual?.hazardTelemetry ?? []) {
        const p = worldToScreen(hazard.x, hazard.y, cameraX, cameraY);
        ctx.strokeStyle = `rgba(255, 95, 118, ${hazard.pulse})`;
        ctx.lineWidth = 1.2;
        ctx.beginPath();
        ctx.arc(p.x + hazard.w * 9, p.y - hazard.h * 9, hazard.warningRadius * 16, 0, Math.PI * 2);
        ctx.stroke();
      }
    }

    function drawChallengeStrip(composition) {
      const progress = composition.challenge?.progress ?? 0;
      const intensity = composition.challenge?.intensity ?? 0;
      ctx.fillStyle = "rgba(0,0,0,0.34)";
      roundRect(ctx, 8, 8, 116, 11, 6);
      ctx.fill();
      ctx.fillStyle = intensity > 70 ? "#ffbf6b" : "#78ffd6";
      roundRect(ctx, 10, 10, 112 * progress, 7, 4);
      ctx.fill();
    }

    function drawComfortFocus(composition) {
      const focus = composition.visual?.comfortFocus;
      if (!focus) return;
      const alpha = focus.vignette * 0.42;
      ctx.fillStyle = `rgba(0, 0, 0, ${alpha})`;
      ctx.fillRect(0, 0, 320, 8);
      ctx.fillRect(0, 172, 320, 8);
      ctx.fillRect(0, 0, 8, 180);
      ctx.fillRect(312, 0, 8, 180);
    }

    function worldToScreen(x, y, cameraX, cameraY) {
      return { x: 160 + (x - cameraX) * 18, y: 118 - (y - cameraY) * 18 };
    }

    function drawDescriptor(item, cameraX, cameraY) {
      if (["camera", "parallax-layer"].includes(item.type)) return;
      const p = worldToScreen(item.x ?? 0, item.y ?? 0, cameraX, cameraY);
      const ww = (item.w ?? 0.6) * 18;
      const hh = (item.h ?? 0.6) * 18;
      if (item.type === "solid" || item.type === "moving-platform") {
        ctx.fillStyle = item.type === "moving-platform" ? "#78ffd6" : "#7fa7ff";
        roundRect(ctx, p.x, p.y - hh, ww, hh, 2);
        ctx.fill();
      } else if (item.type === "collectible") {
        ctx.fillStyle = "#ffd35a";
        ctx.beginPath(); ctx.arc(p.x, p.y, 5, 0, Math.PI * 2); ctx.fill();
      } else if (item.type === "hazard") {
        ctx.fillStyle = "#ff4b6e";
        ctx.fillRect(p.x, p.y - hh, ww, hh);
      } else if (item.type === "exit") {
        ctx.strokeStyle = "#9dff7a";
        ctx.lineWidth = 2;
        ctx.strokeRect(p.x, p.y - hh, ww, hh);
      } else if (item.type === "avatar") {
        ctx.fillStyle = item.mode === "fallen" ? "#ff4b6e" : "#ffffff";
        roundRect(ctx, p.x, p.y - hh, ww, hh, 3);
        ctx.fill();
      }
    }

    function roundRect(context, x, y, w, h, r) {
      context.beginPath();
      context.moveTo(x + r, y);
      context.arcTo(x + w, y, x + w, y + h, r);
      context.arcTo(x + w, y + h, x, y + h, r);
      context.arcTo(x, y + h, x, y, r);
      context.arcTo(x, y, x + w, y, r);
      context.closePath();
    }

    async function boot() {
      const NexusRealtime = await import(NEXUS_URL);
      const { createPlatformerLevelDomainKit } = await import(`${PROTOKITS}/platformer-level-domain-kit/index.js`);
      const { createPlatformerAvatarDomainKit } = await import(`${PROTOKITS}/platformer-avatar-domain-kit/index.js`);
      const { createPlatformerPhysicsSystemKit, simulatePlatformerStep } = await import(`${PROTOKITS}/platformer-physics-system-kit/index.js`);
      const { createPlatformerCollisionDomainKit } = await import(`${PROTOKITS}/platformer-collision-domain-kit/index.js`);
      const { createPlatformerObjectDomainKit } = await import(`${PROTOKITS}/platformer-object-domain-kit/index.js`);
      const { createPlatformerCameraDomainKit } = await import(`${PROTOKITS}/platformer-camera-domain-kit/index.js`);
      const { createPlatformerRenderDescriptorKit } = await import(`${PROTOKITS}/platformer-render-descriptor-kit/index.js`);
      const { createPlatformerEffectsDomainKit } = await import(`${PROTOKITS}/platformer-effects-domain-kit/index.js`);
      const { createPlatformerParallaxDomainKit } = await import(`${PROTOKITS}/platformer-parallax-domain-kit/index.js`);
      const { createPlatformerObjectiveSequenceKit } = await import(`${PROTOKITS}/platformer-objective-sequence-kit/index.js`);
      const { createXrPoseDomainKit } = await import(`${PROTOKITS}/xr-pose-domain-kit/index.js`);
      const { createXrInputAdapterKit } = await import(`${PROTOKITS}/xr-input-adapter-kit/index.js`);
      const { createSpatialAnchorDomainKit } = await import(`${PROTOKITS}/spatial-anchor-domain-kit/index.js`);
      const { createSpatialGameBoardDomainKit } = await import(`${PROTOKITS}/spatial-game-board-domain-kit/index.js`);
      const { createXrComfortDomainKit } = await import(`${PROTOKITS}/xr-comfort-domain-kit/index.js`);
      const { createXrPlatformerRenderAdapterKit } = await import(`${PROTOKITS}/xr-platformer-render-adapter-kit/index.js`);
      const { createStereoscopicRenderDomainKit } = await import(`${PROTOKITS}/stereoscopic-render-domain-kit/index.js`);

      const createEngine = NexusRealtime.createRealtimeGame ?? NexusRealtime.createRealtimeEngine ?? NexusRealtime.createEngine;
      if (typeof createEngine !== "function") throw new Error("NexusEngine CDN runtime did not expose createRealtimeGame/createRealtimeEngine/createEngine.");
      const engine = createEngine({
        kits: [
          createPlatformerLevelDomainKit(NexusRealtime),
          createPlatformerAvatarDomainKit(NexusRealtime),
          createPlatformerCollisionDomainKit(NexusRealtime),
          createPlatformerPhysicsSystemKit(NexusRealtime),
          createPlatformerObjectDomainKit(NexusRealtime),
          createPlatformerCameraDomainKit(NexusRealtime),
          createPlatformerRenderDescriptorKit(NexusRealtime),
          createPlatformerEffectsDomainKit(NexusRealtime),
          createPlatformerParallaxDomainKit(NexusRealtime),
          createPlatformerObjectiveSequenceKit(NexusRealtime),
          createXrPoseDomainKit(NexusRealtime),
          createXrInputAdapterKit(NexusRealtime),
          createSpatialAnchorDomainKit(NexusRealtime),
          createSpatialGameBoardDomainKit(NexusRealtime),
          createXrComfortDomainKit(NexusRealtime),
          createStereoscopicRenderDomainKit(NexusRealtime, { requires: [] }),
          createXrPlatformerRenderAdapterKit(NexusRealtime)
        ]
      });

      let avatar = engine.platformerAvatar.getState();
      let last = performance.now();
      let wasJumping = false;
      let wasRestarting = false;

      window.GameHost = {
        engine,
        getState: () => ({ avatar, level: engine.platformerLevel.getState(), board: engine.spatialGameBoard.getState(), sequence: engine.platformerSequence.getState(), boardComposition: latestBoardComposition }),
        getBoardComposition: () => latestBoardComposition,
        getBoardDomainSnapshot: () => boardCompositionKit.snapshot({
          avatar,
          level: engine.platformerLevel.getState().level,
          objects: engine.platformerObjects.getState(),
          camera: engine.platformerCamera.updateFromAvatar(avatar, engine.platformerLevel.getState().level),
          board: engine.spatialGameBoard.getState(),
          comfort: { warnings: [] },
          sequence: engine.platformerSequence.getState(),
          xrPose: engine.xrPose.getState(),
          time: performance.now() / 1000
        })
      };

      function frame(now) {
        const dt = Math.min(1 / 30, (now - last) / 1000 || 1 / 60);
        last = now;
        const axis = (keys.has("d") || keys.has("arrowright") ? 1 : 0) - (keys.has("a") || keys.has("arrowleft") ? 1 : 0);
        const jump = keys.has(" ") || keys.has("w") || keys.has("arrowup");
        const restart = keys.has("r");
        engine.xrPose.submit({ head });
        engine.xrInput.submit({ moveAxis: axis, jumpPressed: jump && !wasJumping, restartPressed: restart && !wasRestarting });
        wasJumping = jump;
        wasRestarting = restart;
        engine.tick(dt);

        if (restart) avatar = engine.platformerAvatar.getState();
        avatar.moveAxis = axis;
        if (jump && avatar.grounded) { avatar.jumpQueued = true; avatar.jumpBuffer = 0.12; }
        const level = engine.platformerLevel.getState().level;
        avatar = simulatePlatformerStep(avatar, level, dt);
        const collisions = engine.platformerCollision.resolve(avatar, level);
        const objects = engine.platformerObjects.getState();
        for (const coin of level.collectibles) {
          const box = { x: avatar.position.x, y: avatar.position.y, w: avatar.size.x, h: avatar.size.y };
          const hit = box.x < coin.x + 0.3 && box.x + box.w > coin.x - 0.3 && box.y < coin.y + 0.3 && box.y + box.h > coin.y - 0.3;
          if (hit) engine.platformerObjects.collect(coin.id, coin.value);
        }
        if (collisions.hazardHits.length || avatar.mode === "fallen") { engine.platformerEffects.spawn("hazard", avatar.position); avatar = engine.platformerAvatar.reset({}).position ? engine.platformerAvatar.getState() : engine.platformerAvatar.getState(); }
        if (collisions.exitHits.length) engine.platformerObjects.exit(collisions.exitHits[0]);
        const camera = engine.platformerCamera.updateFromAvatar(avatar, level);
        const sequence = engine.platformerSequence.evaluate({ objects: engine.platformerObjects.getState(), avatar });
        const render = engine.platformerRender.build({ avatar, level, objects: engine.platformerObjects.getState(), camera });
        const parallax = engine.platformerParallax.project(camera);
        const board = engine.spatialGameBoard.getState();
        const stereo = engine.stereoscopicRender.updateFromCamera(head, dt);
        const comfort = engine.xrComfort.evaluate({ head, board });
        const adapter = engine.xrPlatformerRenderAdapter.compose({ render, board, stereo, parallax, effects: engine.platformerEffects.getState().effects, sequence });
        latestBoardComposition = boardCompositionKit.describe({ avatar, level, objects: engine.platformerObjects.getState(), camera, board, comfort, sequence, xrPose: engine.xrPose.getState(), time: now / 1000 });

        objective.textContent = latestBoardComposition.hud.objective;
        controls.textContent = latestBoardComposition.hud.controls;
        hud.dataset.tone = latestBoardComposition.hud.statusTone;
        drawBoard({ avatar, camera, render, sequence, board, stereo, comfort, adapter, xrPose: engine.xrPose.getState(), boardComposition: latestBoardComposition });
        requestAnimationFrame(frame);
      }
      requestAnimationFrame(frame);
    }

    boot().catch(showFatal);
  </script>
