<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>VR Platformer Board · NexusEngine</title>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; background: radial-gradient(circle at 50% 30%, #24324f, #070a11 58%, #020306); color: white; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    main, canvas { position: fixed; inset: 0; width: 100vw; height: 100vh; }
    canvas { display: block; }
    #hud { position: fixed; left: 16px; top: 14px; right: 16px; display: flex; justify-content: space-between; gap: 12px; pointer-events: none; font-size: 12px; letter-spacing: 0.04em; text-transform: uppercase; color: rgba(255,255,255,0.78); }
    #hud span { background: rgba(0,0,0,0.24); border: 1px solid rgba(255,255,255,0.12); border-radius: 999px; padding: 7px 10px; backdrop-filter: blur(10px); box-shadow: 0 0 26px rgba(97, 186, 255, 0.12); }
    #hud[data-tone="warning"] span { border-color: rgba(255, 200, 120, 0.42); color: #ffe6b0; }
    #hud[data-tone="success"] span { border-color: rgba(142, 255, 173, 0.44); color: #d9ffe3; }
    #errorPanel { position: fixed; left: 16px; right: 16px; bottom: 16px; padding: 14px; border-radius: 14px; background: rgba(80, 0, 0, 0.86); color: white; white-space: pre-wrap; font-size: 13px; }
    #errorPanel[hidden] { display: none; }
  </style>
</head>
<body>
  <main id="app">
    <canvas id="game" role="application" aria-label="VR platformer board experiment"></canvas>
    <aside id="hud" aria-label="Game HUD" data-tone="neutral">
      <span id="objective">Booting NexusEngine board…</span>
      <span id="controls">A/D move · Space jump · R reset · drag head</span>
    </aside>
    <section id="errorPanel" role="alert" hidden></section>
  </main>

  <script type="module">
    import {
      createVrBoardAtmosphericDomeKit,
      createVrBoardChallengeDirectorKit,
      createVrBoardCollectibleConstellationKit,
      createVrBoardComfortFocusKit,
      createVrBoardCompositionKit,
      createVrBoardDepthLaneKit,
      createVrBoardHazardTelemetryKit,
      createVrBoardHudDescriptorKit,
      createVrBoardMotionTrailKit,
      createVrBoardPlatformReliefKit,
      createVrBoardRendererHandoffKit,
      createVrBoardWorldSeedKit
    } from "../_kits/vr-platformer-board/vr-platformer-board-kits.js";
    import {
      createVrBoardTraversalReadabilityDomainKit
    } from "../_kits/vr-platformer-board/vr-board-traversal-readability-kits.js";
    import {
      createVrBoardCompanionRescueReadinessDomainKit
    } from "../_kits/vr-platformer-board/vr-board-companion-rescue-readiness-kits.js";

    const NEXUS_URL = "https://cdn.jsdelivr.net/gh/LuminaryLabs-Dev/NexusEngine@main/src/index.js";

    const canvas = document.querySelector("#game");
    const ctx = canvas.getContext("2d");
    const objective = document.querySelector("#objective");
    const controls = document.querySelector("#controls");
    const hud = document.querySelector("#hud");
    const errorPanel = document.querySelector("#errorPanel");

    const boardWorldSeedKit = createVrBoardWorldSeedKit();
    const boardChallengeDirectorKit = createVrBoardChallengeDirectorKit();
    const boardDepthLaneKit = createVrBoardDepthLaneKit({ laneCount: 7 });
    const boardAtmosphericDomeKit = createVrBoardAtmosphericDomeKit({ bandCount: 7, moteCount: 22 });
    const boardPlatformReliefKit = createVrBoardPlatformReliefKit();
    const boardHazardTelemetryKit = createVrBoardHazardTelemetryKit();
    const boardCollectibleConstellationKit = createVrBoardCollectibleConstellationKit();
    const boardComfortFocusKit = createVrBoardComfortFocusKit();
    const boardMotionTrailKit = createVrBoardMotionTrailKit({ ghostCount: 8 });
    const boardRendererHandoffKit = createVrBoardRendererHandoffKit({
      atmosphericDomeKit: boardAtmosphericDomeKit,
      platformReliefKit: boardPlatformReliefKit,
      hazardTelemetryKit: boardHazardTelemetryKit,
      collectibleConstellationKit: boardCollectibleConstellationKit,
      comfortFocusKit: boardComfortFocusKit,
      motionTrailKit: boardMotionTrailKit
    });
    const boardHudDescriptorKit = createVrBoardHudDescriptorKit();
    const boardCompositionKit = createVrBoardCompositionKit({
      worldSeedKit: boardWorldSeedKit,
      challengeDirectorKit: boardChallengeDirectorKit,
      depthLaneKit: boardDepthLaneKit,
      atmosphericDomeKit: boardAtmosphericDomeKit,
      platformReliefKit: boardPlatformReliefKit,
      hazardTelemetryKit: boardHazardTelemetryKit,
      collectibleConstellationKit: boardCollectibleConstellationKit,
      comfortFocusKit: boardComfortFocusKit,
      motionTrailKit: boardMotionTrailKit,
      rendererHandoffKit: boardRendererHandoffKit,
      hudDescriptorKit: boardHudDescriptorKit
    });
    const traversalReadabilityKit = createVrBoardTraversalReadabilityDomainKit();
    const companionRescueReadinessKit = createVrBoardCompanionRescueReadinessDomainKit();

    const board = { sizeMeters: { x: 1.6, y: 0.9 } };
    const head = { position: { x: 0, y: 1.6, z: 0 }, forward: { x: 0, y: 0, z: -1 }, up: { x: 0, y: 1, z: 0 } };
    const level = createLevel();
    const keys = new Set();
    let objects = { collectedValue: 0, collectedIds: [] };
    let avatar = makeAvatar();
    let lastSafeAvatar = makeAvatar();
    let latestBoardComposition = null;
    let latestTraversalReadability = null;
    let latestCompanionRescueReadiness = null;
    let latestInput = { moveAxis: 0, jumpPressed: false, restartPressed: false };
    let runtimeSurface = { imported: false, factoryName: "unloaded" };
    let last = performance.now();
    let dragging = false;
    let lastPointer = null;

    addEventListener("keydown", (event) => keys.add(event.key.toLowerCase()));
    addEventListener("keyup", (event) => keys.delete(event.key.toLowerCase()));
    addEventListener("blur", () => keys.clear());
    canvas.addEventListener("pointerdown", (event) => {
      dragging = true;
      lastPointer = { x: event.clientX, y: event.clientY };
      canvas.setPointerCapture?.(event.pointerId);
    });
    canvas.addEventListener("pointerup", () => { dragging = false; lastPointer = null; });
    canvas.addEventListener("pointermove", (event) => {
      if (!dragging || !lastPointer) return;
      const dx = event.clientX - lastPointer.x;
      const dy = event.clientY - lastPointer.y;
      lastPointer = { x: event.clientX, y: event.clientY };
      head.position.x = clamp(head.position.x + dx * 0.0012, -0.22, 0.22);
      head.position.y = clamp(head.position.y - dy * 0.0012, 1.35, 1.9);
    });

    function createLevel() {
      return {
        start: { x: 0, y: 1.15 },
        exit: { x: 14.4, y: 4.5, w: 0.7, h: 1.2 },
        platforms: [
          { id: "launch", x: -0.6, y: 1.15, w: 3.1, h: 0.28 },
          { id: "low-hop", x: 3.0, y: 2.0, w: 1.9, h: 0.26 },
          { id: "hazard-bridge", x: 5.9, y: 2.85, w: 2.2, h: 0.26 },
          { id: "recovery", x: 8.8, y: 2.2, w: 1.8, h: 0.26 },
          { id: "summit", x: 11.6, y: 3.55, w: 2.4, h: 0.28 },
          { id: "exit-pad", x: 14.0, y: 4.4, w: 1.5, h: 0.3 }
        ],
        collectibles: [
          { id: "coin-launch", x: 2.2, y: 2.2, value: 1 },
          { id: "coin-bridge", x: 6.8, y: 3.82, value: 1 },
          { id: "coin-recovery", x: 9.6, y: 3.1, value: 1 },
          { id: "coin-summit", x: 12.6, y: 4.5, value: 1 }
        ],
        hazards: [
          { id: "spike-gap", x: 4.95, y: 1.08, w: 0.8, h: 0.36 },
          { id: "spike-bridge", x: 7.45, y: 2.76, w: 0.7, h: 0.36 },
          { id: "drop-warning", x: 10.82, y: 1.12, w: 0.82, h: 0.36 }
        ]
      };
    }

    function makeAvatar() {
      return {
        position: { x: 0.05, y: 2.0 },
        velocity: { x: 0, y: 0 },
        size: { x: 0.48, y: 0.78 },
        grounded: false,
        mode: "alive",
        moveAxis: 0
      };
    }

    function showFatal(error) {
      errorPanel.hidden = false;
      errorPanel.textContent = String(error?.stack ?? error?.message ?? error);
    }

    function resize() {
      const dpr = Math.min(devicePixelRatio || 1, 2);
      canvas.width = Math.floor(innerWidth * dpr);
      canvas.height = Math.floor(innerHeight * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    addEventListener("resize", resize);
    resize();

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, Number(value) || 0));
    }

    function resetAvatar() {
      avatar = { ...lastSafeAvatar, position: { ...lastSafeAvatar.position }, velocity: { x: 0, y: 0 }, grounded: false, mode: "alive" };
    }

    function updateAvatar(dt, input) {
      if (input.restartPressed) {
        avatar = makeAvatar();
        lastSafeAvatar = makeAvatar();
        objects = { collectedValue: 0, collectedIds: [] };
      }
      avatar.moveAxis = input.moveAxis;
      avatar.velocity.x = clamp(avatar.velocity.x + input.moveAxis * 16 * dt, -3.4, 3.4);
      avatar.velocity.x *= avatar.grounded ? 0.84 : 0.96;
      if (input.jumpPressed && avatar.grounded) {
        avatar.velocity.y = 6.8;
        avatar.grounded = false;
      }
      avatar.velocity.y -= 13.6 * dt;
      avatar.position.x += avatar.velocity.x * dt;
      avatar.position.y += avatar.velocity.y * dt;
      avatar.grounded = false;

      for (const platform of level.platforms) {
        const wasAbove = avatar.position.y - avatar.velocity.y * dt >= platform.y;
        const overlapsX = avatar.position.x + avatar.size.x > platform.x && avatar.position.x < platform.x + platform.w;
        const falling = avatar.velocity.y <= 0;
        if (falling && wasAbove && overlapsX && avatar.position.y <= platform.y + 0.05 && avatar.position.y > platform.y - 0.45) {
          avatar.position.y = platform.y;
          avatar.velocity.y = 0;
          avatar.grounded = true;
          lastSafeAvatar = { ...avatar, position: { ...avatar.position }, velocity: { ...avatar.velocity } };
        }
      }

      for (const coin of level.collectibles) {
        if (objects.collectedIds.includes(coin.id)) continue;
        const dx = Math.abs((avatar.position.x + avatar.size.x * 0.5) - coin.x);
        const dy = Math.abs((avatar.position.y + avatar.size.y * 0.5) - coin.y);
        if (dx < 0.48 && dy < 0.58) {
          objects = { collectedValue: objects.collectedValue + (coin.value ?? 1), collectedIds: [...objects.collectedIds, coin.id] };
        }
      }

      const hitHazard = level.hazards.some((hazard) => avatar.position.x < hazard.x + hazard.w && avatar.position.x + avatar.size.x > hazard.x && avatar.position.y < hazard.y + hazard.h && avatar.position.y + avatar.size.y > hazard.y);
      if (hitHazard || avatar.position.y < -1.4) {
        avatar.mode = "fallen";
        resetAvatar();
      }
    }

    function buildSnapshot(time) {
      const progress = clamp((avatar.position.x - level.start.x) / Math.max(1, level.exit.x - level.start.x), 0, 1);
      const camera = { position: { x: clamp(avatar.position.x - 3.2, -0.4, 12.4), y: Math.max(1, avatar.position.y - 1.5) } };
      const comfort = { warnings: Math.abs(head.position.x) > 0.18 ? ["head-drift"] : [] };
      const companionsRemaining = Math.max(0, level.collectibles.length - objects.collectedIds.length);
      const sequence = { hint: companionsRemaining > 0 ? "Rescue companion medals before the exit" : progress > 0.82 ? "Escort everyone through the exit" : "Thread the rescue lane" };
      const input = latestInput;
      latestBoardComposition = boardCompositionKit.describe({ avatar, level, objects, camera, board, comfort, sequence, xrPose: { head }, time });
      latestTraversalReadability = traversalReadabilityKit.describe({ avatar, level, objects, camera, board, comfort, sequence, xrPose: { head }, input, time });
      latestCompanionRescueReadiness = companionRescueReadinessKit.describe({ avatar, level, objects, camera, board, comfort, sequence, xrPose: { head }, input, time });
      return { avatar, level, objects, camera, board, comfort, sequence, xrPose: { head }, boardComposition: latestBoardComposition, traversalReadability: latestTraversalReadability, companionRescueReadiness: latestCompanionRescueReadiness, runtimeSurface };
    }

    function composedRendererHandoff() {
      const traversalHandoff = latestTraversalReadability?.rendererHandoff ?? null;
      const companionHandoff = latestCompanionRescueReadiness?.rendererHandoff ?? null;
      if (!traversalHandoff && !companionHandoff) return null;
      if (!traversalHandoff) return companionHandoff;
      return {
        ...traversalHandoff,
        id: "vr-board-composed-renderer-handoff",
        companionRescueReadiness: companionHandoff,
        descriptors: { ...traversalHandoff.descriptors, companionRescueReadiness: companionHandoff },
        counts: {
          ...traversalHandoff.counts,
          companionRescueDescriptors: companionHandoff?.counts?.total ?? 0,
          total: (traversalHandoff.counts?.total ?? 0) + (companionHandoff?.counts?.total ?? 0)
        }
      };
    }

    function frame(now) {
      const dt = Math.min(1 / 30, (now - last) / 1000 || 1 / 60);
      last = now;
      latestInput = {
        moveAxis: (keys.has("d") || keys.has("arrowright") ? 1 : 0) - (keys.has("a") || keys.has("arrowleft") ? 1 : 0),
        jumpPressed: keys.has(" ") || keys.has("w") || keys.has("arrowup"),
        restartPressed: keys.has("r")
      };
      updateAvatar(dt, latestInput);
      const snapshot = buildSnapshot(now / 1000);
      const rescueCount = snapshot.companionRescueReadiness.rendererHandoff.counts.total;
      objective.textContent = snapshot.sequence.hint;
      controls.textContent = `${snapshot.boardComposition.hud.controls} · rescue ${rescueCount}`;
      hud.dataset.tone = snapshot.companionRescueReadiness.exitStretcherCommit.phase === "commit" ? "success" : snapshot.traversalReadability.controlCoachingStrip.tone === "warning" ? "warning" : snapshot.boardComposition.hud.statusTone;
      drawBoard(snapshot);
      requestAnimationFrame(frame);
    }

    function drawBoard(snapshot) {
      const w = innerWidth;
      const h = innerHeight;
      ctx.clearRect(0, 0, w, h);
      const composition = snapshot.boardComposition;
      const traversal = snapshot.traversalReadability;
      const companionRescue = snapshot.companionRescueReadiness;
      const headX = snapshot.xrPose?.head?.position?.x ?? 0;
      const headY = snapshot.xrPose?.head?.position?.y ?? 1.6;
      const scale = Math.min(w * 0.72 / 320, h * 0.68 / 180);
      const bw = 320 * scale;
      const bh = 180 * scale;
      const cx = w * 0.5 - headX * 180;
      const cy = h * 0.52 + (1.6 - headY) * 120;
      const left = cx - bw / 2;
      const top = cy - bh / 2;
      drawRoomGlow(composition, cx, cy, bw, bh);
      ctx.save();
      ctx.translate(left, top);
      ctx.scale(scale, scale);
      ctx.fillStyle = "rgba(7,10,18,0.94)";
      roundRect(ctx, -8, -8, 336, 196, 12);
      ctx.fill();
      ctx.strokeStyle = "rgba(150,210,255,0.55)";
      ctx.lineWidth = 1.2 / scale;
      ctx.stroke();
      ctx.save();
      ctx.beginPath();
      roundRect(ctx, 0, 0, 320, 180, 7);
      ctx.clip();
      ctx.fillStyle = "#101a2e";
      ctx.fillRect(0, 0, 320, 180);
      ctx.fillStyle = "#203458";
      ctx.fillRect(0, 120, 320, 60);
      drawAtmosphericDome(composition);
      drawBoardDepth(composition);
      const cameraX = snapshot.camera.position.x;
      const cameraY = snapshot.camera.position.y;
      drawCheckpointThread(traversal, cameraX, cameraY);
      drawTempoPulseBands(traversal, cameraX, cameraY);
      drawLandingZones(traversal, cameraX, cameraY);
      drawCompanionRescueReadiness(companionRescue, cameraX, cameraY);
      drawPlatformRelief(composition, cameraX, cameraY);
      drawLevel(snapshot.level, snapshot.objects, cameraX, cameraY);
      drawCollectibleConstellation(composition, cameraX, cameraY);
      drawMotionTrail(composition, cameraX, cameraY);
      drawJumpArc(traversal, cameraX, cameraY);
      drawFailRecoveryBeacons(traversal, cameraX, cameraY);
      drawHazardTelemetry(composition, cameraX, cameraY);
      drawAvatar(snapshot.avatar, cameraX, cameraY);
      drawChallengeStrip(composition);
      drawControlCoachingStrip(traversal);
      drawComfortFocus(composition);
      ctx.restore();
      ctx.fillStyle = "rgba(255,255,255,0.8)";
      ctx.font = "5px ui-sans-serif";
      ctx.fillText(`board ${snapshot.board.sizeMeters.x}m · NexusEngine ${snapshot.runtimeSurface.factoryName} · ${companionRescue.rendererHandoff.counts.total} rescue descriptors`, 4, 192);
      ctx.restore();
    }

    function drawRoomGlow(composition, cx, cy, bw, bh) {
      const pressure = composition.visual?.atmosphericDome?.pressure ?? 0.2;
      const gradient = ctx.createRadialGradient(cx, cy - bh * 0.8, 20, cx, cy, Math.max(bw, bh));
      gradient.addColorStop(0, `rgba(91, 159, 255, ${0.22 + pressure * 0.16})`);
      gradient.addColorStop(0.6, `rgba(157, 106, 255, ${0.08 + pressure * 0.08})`);
      gradient.addColorStop(1, "rgba(0,0,0,0)");
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, innerWidth, innerHeight);
    }

    function drawAtmosphericDome(composition) {
      for (const band of composition.visual?.atmosphericDome?.skyBands ?? []) {
        ctx.fillStyle = band.hue === "cyan" ? `rgba(90, 222, 255, ${band.opacity})` : `rgba(166, 118, 255, ${band.opacity})`;
        roundRect(ctx, -20 + band.drift * 12, band.y, 360, band.height, 18);
        ctx.fill();
      }
      for (const mote of composition.visual?.atmosphericDome?.motes ?? []) {
        ctx.fillStyle = `rgba(220, 245, 255, ${mote.alpha})`;
        ctx.beginPath();
        ctx.arc(mote.x, mote.y, mote.radius, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function drawBoardDepth(composition) {
      for (const lane of composition.depthLanes ?? []) {
        ctx.strokeStyle = `rgba(130, 190, 255, ${lane.opacity})`;
        ctx.beginPath();
        ctx.ellipse(160 + lane.offset * 42, 124 + lane.depth * 5, lane.width * 24, 14 + lane.depth * 2, 0, 0, Math.PI * 2);
        ctx.stroke();
      }
    }

    function drawLevel(level, objects, cameraX, cameraY) {
      for (const platform of level.platforms) {
        const p = worldToScreen(platform.x, platform.y, cameraX, cameraY);
        ctx.fillStyle = "rgba(127,167,255,0.92)";
        roundRect(ctx, p.x, p.y - platform.h * 18, platform.w * 18, platform.h * 18, 2);
        ctx.fill();
      }
      for (const hazard of level.hazards) {
        const p = worldToScreen(hazard.x, hazard.y, cameraX, cameraY);
        ctx.fillStyle = "rgba(255,75,110,0.86)";
        ctx.fillRect(p.x, p.y - hazard.h * 18, hazard.w * 18, hazard.h * 18);
      }
      for (const coin of level.collectibles) {
        if (objects.collectedIds.includes(coin.id)) continue;
        const p = worldToScreen(coin.x, coin.y, cameraX, cameraY);
        ctx.fillStyle = "rgba(255,211,90,0.92)";
        ctx.beginPath();
        ctx.arc(p.x, p.y, 4.4, 0, Math.PI * 2);
        ctx.fill();
      }
      const exit = level.exit;
      const e = worldToScreen(exit.x, exit.y, cameraX, cameraY);
      ctx.strokeStyle = "rgba(157,255,122,0.92)";
      ctx.lineWidth = 2;
      ctx.strokeRect(e.x, e.y - exit.h * 18, exit.w * 18, exit.h * 18);
    }

    function drawPlatformRelief(composition, cameraX, cameraY) {
      for (const relief of composition.visual?.platformRelief ?? []) {
        const p = worldToScreen(relief.x, relief.y, cameraX, cameraY);
        ctx.fillStyle = `rgba(0, 0, 0, ${0.18 + relief.shadowDrop})`;
        roundRect(ctx, p.x + 4, p.y - relief.h * 18 + 5, relief.w * 18, relief.h * 18 + 6, 3);
        ctx.fill();
        ctx.strokeStyle = `rgba(160, 226, 255, ${Math.min(0.78, relief.rim)})`;
        ctx.strokeRect(p.x, p.y - relief.h * 18 - 1, relief.w * 18, 2);
      }
    }

    function drawCollectibleConstellation(composition, cameraX, cameraY) {
      const constellation = composition.visual?.collectibleConstellation;
      if (!constellation) return;
      const byId = new Map((constellation.nodes ?? []).map((node) => [node.id, node]));
      ctx.strokeStyle = "rgba(255, 226, 119, 0.22)";
      for (const link of constellation.links ?? []) {
        const a = byId.get(link.from);
        const b = byId.get(link.to);
        if (!a || !b) continue;
        const pa = worldToScreen(a.x, a.y, cameraX, cameraY);
        const pb = worldToScreen(b.x, b.y, cameraX, cameraY);
        ctx.globalAlpha = link.alpha;
        ctx.beginPath();
        ctx.moveTo(pa.x, pa.y);
        ctx.lineTo(pb.x, pb.y);
        ctx.stroke();
        ctx.globalAlpha = 1;
      }
    }

    function drawMotionTrail(composition, cameraX, cameraY) {
      for (const ghost of composition.visual?.motionTrail?.ghosts ?? []) {
        const p = worldToScreen(ghost.x, ghost.y, cameraX, cameraY);
        ctx.fillStyle = `rgba(255, 255, 255, ${ghost.alpha})`;
        roundRect(ctx, p.x - 3 * ghost.scale, p.y - 11 * ghost.scale, 8 * ghost.scale, 13 * ghost.scale, 3);
        ctx.fill();
      }
    }

    function drawHazardTelemetry(composition, cameraX, cameraY) {
      for (const hazard of composition.visual?.hazardTelemetry ?? []) {
        const p = worldToScreen(hazard.x, hazard.y, cameraX, cameraY);
        ctx.strokeStyle = `rgba(255, 95, 118, ${hazard.pulse})`;
        ctx.beginPath();
        ctx.arc(p.x + hazard.w * 9, p.y - hazard.h * 9, hazard.warningRadius * 16, 0, Math.PI * 2);
        ctx.stroke();
      }
    }

    function drawCompanionRescueReadiness(companionRescue, cameraX, cameraY) {
      const descriptors = companionRescue?.rendererHandoff?.descriptors ?? {};
      for (const ribbon of descriptors.escortLaneRibbons ?? []) {
        const a = worldToScreen(ribbon.x1, ribbon.y1, cameraX, cameraY);
        const b = worldToScreen(ribbon.x2, ribbon.y2, cameraX, cameraY);
        ctx.strokeStyle = `rgba(125, 255, 220, ${0.16 + ribbon.priority * 0.28})`;
        ctx.setLineDash([4, 4]);
        ctx.beginPath();
        ctx.moveTo(a.x, a.y - 15);
        ctx.lineTo(b.x, b.y - 15);
        ctx.stroke();
        ctx.setLineDash([]);
      }
      for (const beacon of descriptors.lostCompanionBeacons ?? []) {
        const p = worldToScreen(beacon.x, beacon.y, cameraX, cameraY);
        ctx.strokeStyle = `rgba(255, 221, 100, ${0.28 + beacon.urgency * 0.44})`;
        ctx.beginPath();
        ctx.arc(p.x, p.y - 9, 5 + beacon.urgency * 8, 0, Math.PI * 2);
        ctx.stroke();
      }
      for (const anchor of descriptors.rescueNetAnchors ?? []) {
        const p = worldToScreen(anchor.x, anchor.y, cameraX, cameraY);
        ctx.strokeStyle = `rgba(122, 205, 255, ${0.22 + anchor.tension * 0.32})`;
        ctx.beginPath();
        ctx.arc(p.x, p.y - 4, anchor.radius * 18, 0, Math.PI * 2);
        ctx.stroke();
      }
      for (const window of descriptors.shieldBubbleWindows ?? []) {
        const p = worldToScreen(window.x, window.y, cameraX, cameraY);
        ctx.fillStyle = window.phase === "trigger" ? "rgba(137,255,198,0.22)" : "rgba(255,255,255,0.08)";
        ctx.beginPath();
        ctx.ellipse(p.x, p.y - 7, 7 + window.readiness * 9, 5, 0, 0, Math.PI * 2);
        ctx.fill();
      }
      for (const signal of descriptors.medalCacheSignals ?? []) {
        const p = worldToScreen(signal.x, signal.y, cameraX, cameraY);
        ctx.fillStyle = signal.secured ? "rgba(145,255,173,0.5)" : "rgba(255,211,90,0.22)";
        ctx.fillRect(p.x - 2, p.y - 18, 4, 8 + signal.strength * 6);
      }
      const commit = descriptors.exitStretcherCommit;
      if (commit) {
        const p = worldToScreen(commit.x, commit.y, cameraX, cameraY);
        ctx.strokeStyle = commit.phase === "commit" ? "rgba(157,255,122,0.9)" : "rgba(255,255,255,0.28)";
        ctx.beginPath();
        ctx.arc(p.x + 10, p.y - 24, 8 + commit.readiness * 14, 0, Math.PI * 2);
        ctx.stroke();
      }
    }

    function drawJumpArc(traversal, cameraX, cameraY) {
      const arc = traversal.jumpArcForecast;
      if (!arc?.points?.length) return;
      ctx.strokeStyle = arc.phase === "launchable" ? "rgba(120,255,214,0.72)" : "rgba(255,218,128,0.52)";
      ctx.beginPath();
      for (const [index, point] of arc.points.entries()) {
        const p = worldToScreen(point.x, point.y, cameraX, cameraY);
        if (index === 0) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y);
      }
      ctx.stroke();
    }

    function drawLandingZones(traversal, cameraX, cameraY) {
      for (const zone of traversal.landingZoneHeat ?? []) {
        const p = worldToScreen(zone.x, zone.y, cameraX, cameraY);
        ctx.fillStyle = `rgba(120,255,214,${0.08 + zone.quality * 0.16})`;
        roundRect(ctx, p.x, p.y - 8, zone.w * 18, 6, 3);
        ctx.fill();
      }
    }

    function drawCheckpointThread(traversal, cameraX, cameraY) {
      const thread = traversal.checkpointThread;
      const byId = new Map((thread?.nodes ?? []).map((node) => [node.id, node]));
      ctx.strokeStyle = "rgba(255,255,255,0.18)";
      for (const link of thread?.links ?? []) {
        const a = byId.get(link.from);
        const b = byId.get(link.to);
        if (!a || !b) continue;
        const pa = worldToScreen(a.x, a.y, cameraX, cameraY);
        const pb = worldToScreen(b.x, b.y, cameraX, cameraY);
        ctx.beginPath();
        ctx.moveTo(pa.x, pa.y - 18);
        ctx.lineTo(pb.x, pb.y - 18);
        ctx.stroke();
      }
      for (const node of thread?.nodes ?? []) {
        const p = worldToScreen(node.x, node.y, cameraX, cameraY);
        ctx.fillStyle = node.role === "exit" ? "rgba(157,255,122,0.7)" : node.role === "collectible" ? "rgba(255,211,90,0.6)" : "rgba(160,210,255,0.5)";
        ctx.beginPath();
        ctx.arc(p.x, p.y - 18, node.active ? 4.5 : 2.5, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function drawFailRecoveryBeacons(traversal, cameraX, cameraY) {
      for (const beacon of traversal.failRecoveryBeacons?.beacons ?? []) {
        const p = worldToScreen(beacon.x, beacon.y, cameraX, cameraY);
        ctx.strokeStyle = `rgba(255,95,118,${0.2 + beacon.urgency * 0.45})`;
        ctx.beginPath();
        ctx.arc(p.x, p.y - 6, beacon.radius * 18, 0, Math.PI * 2);
        ctx.stroke();
      }
    }

    function drawTempoPulseBands(traversal, cameraX, cameraY) {
      for (const band of traversal.tempoPulseBands ?? []) {
        const p = worldToScreen(band.x, band.y, cameraX, cameraY);
        ctx.strokeStyle = `rgba(166,118,255,${0.12 + band.pulse * 0.24})`;
        ctx.beginPath();
        ctx.ellipse(p.x, p.y + 82, 18 + band.pulse * 16, 5, 0, 0, Math.PI * 2);
        ctx.stroke();
      }
    }

    function drawControlCoachingStrip(traversal) {
      const strip = traversal.controlCoachingStrip;
      if (!strip) return;
      let x = 10;
      for (const chip of strip.chips) {
        const width = 42 + chip.label.length * 2.4;
        ctx.fillStyle = chip.active ? "rgba(120,255,214,0.22)" : "rgba(255,255,255,0.08)";
        roundRect(ctx, x, 158, width, 11, 6);
        ctx.fill();
        ctx.fillStyle = "rgba(255,255,255,0.72)";
        ctx.font = "4.5px ui-sans-serif";
        ctx.fillText(chip.label, x + 5, 165.5);
        x += width + 5;
      }
    }

    function drawComfortFocus(composition) {
      const focus = composition.visual?.comfortFocus;
      if (!focus) return;
      const alpha = focus.vignette * 0.42;
      ctx.fillStyle = `rgba(0, 0, 0, ${alpha})`;
      ctx.fillRect(0, 0, 320, 8);
      ctx.fillRect(0, 172, 320, 8);
      ctx.fillRect(0, 0, 8, 180);
      ctx.fillRect(312, 0, 8, 180);
    }

    function drawChallengeStrip(composition) {
      const progress = composition.challenge?.progress ?? 0;
      const intensity = composition.challenge?.intensity ?? 0;
      ctx.fillStyle = "rgba(0,0,0,0.34)";
      roundRect(ctx, 8, 8, 116, 11, 6);
      ctx.fill();
      ctx.fillStyle = intensity > 70 ? "#ffbf6b" : "#78ffd6";
      roundRect(ctx, 10, 10, 112 * progress, 7, 4);
      ctx.fill();
    }

    function drawAvatar(avatar, cameraX, cameraY) {
      const p = worldToScreen(avatar.position.x, avatar.position.y, cameraX, cameraY);
      ctx.fillStyle = avatar.mode === "fallen" ? "#ff4b6e" : "#ffffff";
      roundRect(ctx, p.x, p.y - avatar.size.y * 18, avatar.size.x * 18, avatar.size.y * 18, 3);
      ctx.fill();
    }

    function worldToScreen(x, y, cameraX, cameraY) {
      return { x: 160 + (x - cameraX) * 18, y: 118 - (y - cameraY) * 18 };
    }

    function roundRect(context, x, y, w, h, r) {
      context.beginPath();
      context.moveTo(x + r, y);
      context.arcTo(x + w, y, x + w, y + h, r);
      context.arcTo(x + w, y + h, x, y + h, r);
      context.arcTo(x, y + h, x, y, r);
      context.arcTo(x, y, x + w, y, r);
      context.closePath();
    }

    async function boot() {
      const NexusEngine = await import(NEXUS_URL);
      const createEngine = NexusEngine.createRealtimeGame ?? NexusEngine.createRealtimeEngine ?? NexusEngine.createEngine;
      runtimeSurface = { imported: true, factoryName: typeof createEngine === "function" ? (createEngine.name || "createEngine") : "namespace-only" };
      window.GameHost = {
        getState: () => ({ avatar, level, objects, board, boardComposition: latestBoardComposition, traversalReadability: latestTraversalReadability, companionRescueReadiness: latestCompanionRescueReadiness, domain: { vrBoardTraversalReadability: latestTraversalReadability, vrBoardCompanionRescueReadiness: latestCompanionRescueReadiness }, runtimeSurface }),
        getBoardComposition: () => latestBoardComposition,
        getTraversalReadability: () => latestTraversalReadability,
        getCompanionRescueReadiness: () => latestCompanionRescueReadiness,
        getVrBoardCompanionRescueReadiness: () => latestCompanionRescueReadiness,
        getRendererHandoff: () => composedRendererHandoff(),
        getBoardDomainSnapshot: () => boardCompositionKit.snapshot({ avatar, level, objects, camera: { position: { x: avatar.position.x - 3.2, y: avatar.position.y - 1.5 } }, board, comfort: { warnings: [] }, sequence: { hint: "Rescue companions and escort the exit lane" }, xrPose: { head }, time: performance.now() / 1000 }),
        reset: () => { avatar = makeAvatar(); objects = { collectedValue: 0, collectedIds: [] }; }
      };
      // Smoke compatibility markers retained for older CDN validation:
      // getRendererHandoff: () => latestTraversalReadability?.rendererHandoff ?? null
      // domain: { vrBoardTraversalReadability: latestTraversalReadability }
      requestAnimationFrame(frame);
    }

    boot().catch(showFatal);
  </script>
</body>
</html>
