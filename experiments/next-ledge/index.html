<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Next Ledge — NexusEngine Experiment</title>
  <style>
    :root { --ink:#03070b; --danger:#ff5a5a; color-scheme:dark; }
    *{box-sizing:border-box}
    html,body{margin:0;width:100%;height:100%;overflow:hidden;background:var(--ink);color:#fffaf0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,sans-serif}
    main#app,canvas#game{position:fixed;inset:0}
    canvas#game{display:block;width:100vw;height:100vh;cursor:crosshair;touch-action:none}
    #hud{position:absolute;width:1px;height:1px;margin:-1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap;border:0;padding:0}
    #errorPanel{position:fixed;z-index:30;left:18px;right:18px;bottom:18px;padding:16px;border:0;border-radius:18px;background:rgba(42,4,2,.94);color:#fff1ea;white-space:pre-wrap;font:12px ui-monospace,SFMono-Regular,Menlo,monospace;box-shadow:0 22px 80px rgba(0,0,0,.54),inset 0 0 0 1px rgba(255,210,190,.22)}
    #errorPanel[hidden]{display:none}
    @media (prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important;scroll-behavior:auto!important}}
  </style>
</head>
<body>
  <main id="app" data-upgrade="rescue-line-readiness-renderer-handoff-pass summit-bivouac-readiness-renderer-handoff-pass ravine-evacuation-readiness-renderer-handoff-pass glacier-supply-readiness-renderer-handoff-pass">
    <canvas id="game" role="application" aria-label="Next Ledge glacier supply readiness game canvas"></canvas>
    <aside id="hud" aria-label="Game state for screen readers"><header id="status" aria-live="polite">Loading Next Ledge glacier supply readiness</header><footer id="readout"></footer></aside>
    <section id="errorPanel" role="alert" hidden></section>
  </main>
  <script type="module">
    import { attachNexusRealtimePageLoader } from "../_shared/nexus-realtime-page-loader.js";
    attachNexusRealtimePageLoader({ title: "Next Ledge", loadingLabel: "Loading Next Ledge glacier supply readiness" });
  </script>
  <script type="module" src="./src/main.js?v=rescue-line-readiness-1-ravine-evacuation-1-glacier-supply-1"></script>
  <script type="module" src="./src/rescue-line-readiness-entry.js?v=rescue-line-readiness-1"></script>
  <script type="module" src="./src/summit-bivouac-readiness-entry.js?v=summit-bivouac-readiness-1"></script>
  <script type="module" src="./src/ravine-evacuation-readiness-entry.js?v=ravine-evacuation-readiness-1"></script>
  <script type="module" src="./src/glacier-supply-readiness-entry.js?v=glacier-supply-readiness-1"></script>
</body>
</html>
