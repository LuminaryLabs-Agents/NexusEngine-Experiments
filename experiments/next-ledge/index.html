<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Next Ledge — NexusRealtime Experiment</title>
  <style>
    :root { --ink:#03070b; --danger:#ff5a5a; }
    *{box-sizing:border-box}
    html,body{margin:0;width:100%;height:100%;overflow:hidden;background:var(--ink);color:white;font-family:Inter,ui-sans-serif,system-ui,-apple-system,sans-serif}
    main#app,canvas#game{position:fixed;inset:0}
    canvas#game{display:block;width:100vw;height:100vh;cursor:crosshair;touch-action:none}
    #hud{position:absolute;width:1px;height:1px;margin:-1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap;border:0;padding:0}
    #errorPanel{position:fixed;z-index:30;left:18px;right:18px;bottom:18px;padding:14px;border:1px solid var(--danger);border-radius:12px;background:rgba(80,0,0,.82);color:white;white-space:pre-wrap;font:12px ui-monospace,SFMono-Regular,Menlo,monospace}
    #errorPanel[hidden]{display:none}
  </style>
</head>
<body>
  <main id="app">
    <canvas id="game" role="application" aria-label="Next Ledge game canvas"></canvas>
    <aside id="hud" aria-label="Game state for screen readers"><header id="status" aria-live="polite">Loading Next Ledge</header><footer id="readout"></footer></aside>
    <section id="errorPanel" role="alert" hidden></section>
  </main>
  <script type="module">
    import { attachNexusRealtimePageLoader } from "../_shared/nexus-realtime-page-loader.js";
    attachNexusRealtimePageLoader({ title: "Next Ledge", loadingLabel: "Loading Next Ledge" });
  </script>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
