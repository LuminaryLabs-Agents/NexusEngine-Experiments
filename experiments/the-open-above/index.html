<!doctype html>
<html lang="en">
<head>

  <title>The Open Above</title>
  <style>
    html,body{margin:0;height:100%;overflow:hidden;background:#08121b;color:#fff;font-family:system-ui,-apple-system,Segoe UI,sans-serif}

  </style>
</head>
<body>
