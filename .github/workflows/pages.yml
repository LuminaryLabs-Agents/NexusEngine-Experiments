name: Deploy static site to GitHub Pages
run-name: Deploy static site to GitHub Pages @ ${{ github.sha }}

on:
  push:
    branches:
      - "main"
  workflow_dispatch:

env:
  DEPLOY_REF: "main"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout deployment branch
        uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_REF }}

      - name: Confirm deployment source
        run: |
          echo "Deploying $DEPLOY_REF at $GITHUB_SHA"
          test -f "experiments/The Cavalry of Rome/src/cavalry-arena-polish-pass.js"
          test -f "experiments/The Cavalry of Rome/src/universal-animation-library-pass.js"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Generate static routes
        run: npm run generate

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        with:
          timeout: 900000
          error_count: 20
          reporting_interval: 10000
