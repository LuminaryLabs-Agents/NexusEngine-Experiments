<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Rogue-Lite Hellscape Siege V2, a kit-shaped NexusRealtime experiment." />
  <title>Rogue-Lite Hellscape Siege V2</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main id="app" aria-label="Rogue-Lite Hellscape Siege V2">
    <canvas id="game" role="application" aria-label="Game canvas"></canvas>
    <aside id="hud" aria-label="Game HUD">

      <footer id="bottomHud">WASD move · E interact · Hold Space action · B build · I inventory</footer>

    <section id="errorPanel" role="alert" hidden></section>
  </main>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
