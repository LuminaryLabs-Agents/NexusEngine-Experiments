plugins { id 'com.android.application' }

android {
    namespace 'dev.luminarylabs.seedspatial.openxr'
    compileSdk 35

    defaultConfig {
        applicationId 'dev.luminarylabs.seedspatial.openxr'
        minSdk 29
        targetSdk 35
        versionCode 1
        versionName '0.1.0'
        ndk { abiFilters 'arm64-v8a' }
        externalNativeBuild {
            cmake {
                arguments '-DANDROID_STL=c++_static', '-DANDROID_ARM_NEON=TRUE'
                cppFlags '-std=c++17 -Wall -Wextra -Wno-unused-parameter'
            }
        }
    }

    externalNativeBuild { cmake { path 'src/main/cpp/CMakeLists.txt'; version '3.22.1' } }
}
